// ─────────────────────────────────────────────────────────────────────────────
// Report section designer (admin) — edits template.reportSections used by
// SectionedReport. Config-only: preview the rendered result via the template
// tester. Supports the five section types; scope:"ids" offers a question picker.
// ─────────────────────────────────────────────────────────────────────────────
function SectionDesigner({ template, onChange }) {
  const sections = Array.isArray(template.reportSections) ? template.reportSections : [];
  const numbered = withNumbers(template.questions);
  const labelOf = Object.fromEntries(numbered.map((x) => [x.id, x.label]));
  const choiceQs = template.questions.filter((q) => q.type === "choice");        // demographic summaries
  const nonTextQs = template.questions.filter((q) => !q.leadIn && q.type !== "text"); // question-result blocks
  const textQs = template.questions.filter((q) => q.type === "text");            // comment collations
  const qName = (q) => `${labelOf[q.id] ? labelOf[q.id] + ". " : ""}${q.text || "(untitled)"}`;

  const setSec = (i, patch) => onChange(sections.map((s, idx) => (idx === i ? { ...s, ...patch } : s)));
  const removeSec = (i) => onChange(sections.filter((_, idx) => idx !== i));
  const moveSec = (i, dir) => {
    const j = i + dir;
    if (j < 0 || j >= sections.length) return;
    const next = [...sections];
    [next[i], next[j]] = [next[j], next[i]];
    onChange(next);
  };
  const addSec = (type) => {
    const seed =
      type === "heading" ? { type: "heading", text: "" }
      : type === "narrative" ? { type: "narrative", text: "" }
      : type === "demographic" ? { type: "demographic", questionId: choiceQs[0] ? choiceQs[0].id : undefined, display: "inline" }
      : type === "questions" ? { type: "questions", scope: "all" }
      : { type: "comments", scope: "all" };
    onChange([...sections, seed]);
  };
  const toggleId = (i, id, pool) => {
    const sec = sections[i];
    const have = new Set(Array.isArray(sec.ids) ? sec.ids : []);
    if (have.has(id)) have.delete(id); else have.add(id);
    const ordered = pool.filter((q) => have.has(q.id)).map((q) => q.id); // keep question order
    setSec(i, { ids: ordered });
  };

  const TYPE_LABEL = { heading: "Heading", narrative: "Narrative", demographic: "Demographic summary", questions: "Question results", comments: "Comment collation" };

  return (
    <div>
      {sections.length === 0 && (
        <div className="rounded-xl p-3 text-xs mb-2" style={{ background: BRAND.amberSoft, color: "#8a5a13" }}>
          No sections yet — the report would show only the header. Add sections below.
        </div>
      )}

      {sections.map((sec, i) => {
        const pool = sec.type === "comments" ? textQs : nonTextQs;
        const warn =
          sec.type === "demographic" && (!sec.questionId || !template.questions.some((q) => q.id === sec.questionId)) ? "Choose a question, or this section won't render."
          : (sec.type === "questions" || sec.type === "comments") && sec.scope === "ids" && !(Array.isArray(sec.ids) && sec.ids.length) ? "No questions selected — this section won't render."
          : (sec.type === "heading" || sec.type === "narrative") && !(sec.text && sec.text.trim()) ? "Empty — nothing will show here."
          : null;
        return (
          <Card key={i} className="!p-3 mb-2">
            <div className="flex items-center gap-2">
              <div className="flex flex-col leading-none">
                <button onClick={() => moveSec(i, -1)} disabled={i === 0} className="text-[10px]" style={{ color: i === 0 ? BRAND.line : BRAND.grey }}>▲</button>
                <button onClick={() => moveSec(i, 1)} disabled={i === sections.length - 1} className="text-[10px]" style={{ color: i === sections.length - 1 ? BRAND.line : BRAND.grey }}>▼</button>
              </div>
              <span className="text-xs font-semibold px-2 py-0.5 rounded-full" style={{ background: BRAND.plumSoft, color: BRAND.plum }}>{TYPE_LABEL[sec.type] || sec.type}</span>
              <div className="flex-1" />
              <button onClick={() => removeSec(i)} className="text-xs font-semibold" style={{ color: BRAND.bad }}>Remove</button>
            </div>

            <div className="mt-2.5">
              {sec.type === "heading" && (
                <input value={sec.text || ""} onChange={(e) => setSec(i, { text: e.target.value })} placeholder="Heading text…"
                  className="w-full rounded-lg border p-2 text-sm outline-none" style={{ borderColor: BRAND.line, color: BRAND.ink }} />
              )}
              {sec.type === "narrative" && (
                <textarea rows={2} value={sec.text || ""} onChange={(e) => setSec(i, { text: e.target.value })} placeholder="Narrative paragraph (e.g. a methodology note)…"
                  className="w-full rounded-lg border p-2 text-sm outline-none" style={{ borderColor: BRAND.line, color: BRAND.ink }} />
              )}
              {sec.type === "demographic" && (
                <div className="space-y-2">
                  <select value={sec.questionId || ""} onChange={(e) => setSec(i, { questionId: e.target.value || undefined })}
                    className="w-full rounded-lg border p-2 text-sm bg-white outline-none" style={{ borderColor: BRAND.line, color: BRAND.ink }}>
                    <option value="">— choose a single-select question —</option>
                    {choiceQs.map((q) => <option key={q.id} value={q.id}>{qName(q)}</option>)}
                  </select>
                  <input value={sec.heading || ""} onChange={(e) => setSec(i, { heading: e.target.value })} placeholder="Heading override (optional — defaults to the question text)…"
                    className="w-full rounded-lg border p-2 text-xs outline-none" style={{ borderColor: BRAND.line, color: BRAND.ink }} />
                </div>
              )}
              {(sec.type === "questions" || sec.type === "comments") && (
                <div className="space-y-2">
                  <div className="flex items-center gap-4 text-xs" style={{ color: BRAND.grey }}>
                    {[["all", sec.type === "comments" ? "All free-text questions" : "All question results"], ["ids", "Selected only"]].map(([sc, lab]) => (
                      <label key={sc} className="flex items-center gap-1 cursor-pointer">
                        <input type="radio" name={`scope-${i}`} checked={(sec.scope || "all") === sc} onChange={() => setSec(i, { scope: sc })} />
                        {lab}
                      </label>
                    ))}
                  </div>
                  {sec.scope === "ids" && (
                    <div className="rounded-lg border max-h-44 overflow-auto p-1" style={{ borderColor: BRAND.line }}>
                      {pool.length === 0 && <div className="text-xs p-2" style={{ color: BRAND.grey }}>No eligible questions in this template.</div>}
                      {pool.map((q) => (
                        <label key={q.id} className="flex items-start gap-2 px-1.5 py-1 text-xs cursor-pointer">
                          <input type="checkbox" checked={Array.isArray(sec.ids) && sec.ids.includes(q.id)} onChange={() => toggleId(i, q.id, pool)} className="mt-0.5" />
                          <span style={{ color: BRAND.ink }}>{qName(q)}</span>
                        </label>
                      ))}
                    </div>
                  )}
                </div>
              )}
            </div>

            {warn && <div className="mt-2 text-xs" style={{ color: "#8a5a13" }}>⚠ {warn}</div>}
          </Card>
        );
      })}

      <div className="flex flex-wrap gap-2 mt-1">
        <Btn kind="ghost" onClick={() => addSec("heading")}>+ Heading</Btn>
        <Btn kind="ghost" onClick={() => addSec("narrative")}>+ Narrative</Btn>
        <Btn kind="ghost" onClick={() => addSec("demographic")}>+ Demographic</Btn>
        <Btn kind="ghost" onClick={() => addSec("questions")}>+ Question results</Btn>
        <Btn kind="ghost" onClick={() => addSec("comments")}>+ Comments</Btn>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// Shared: template editor (manual authoring + editing imported/generated)
// ─────────────────────────────────────────────────────────────────────────────
function TemplateEditor({ initial, onCancel, onSave, onSaveDraft, colleges = [], onAddCollege }) {
  const [t, setT] = useState(initial);
  const [editorTab, setEditorTab] = useState("survey");
  const [showImport, setShowImport] = useState(false);
  const [importBusy, setImportBusy] = useState(false);
  const [showReportImport, setShowReportImport] = useState(false);
  const [reportImportBusy, setReportImportBusy] = useState(false);
  const [addingCollege, setAddingCollege] = useState(false);
  const [newCollegeName, setNewCollegeName] = useState("");
  const setField = (k, v) => setT({ ...t, [k]: v });
  const labels = Object.fromEntries(withNumbers(t.questions).map((x) => [x.id, x.label]));
  const blocks = toBlocks(t.questions);
  const flatten = (bs) => bs.flatMap((b) => [b.parent, ...b.children]);
  const normalize = (qs) => { const bs = toBlocks(qs); return fromBlocks([...bs.filter((b) => b.parent.leadIn), ...bs.filter((b) => !b.parent.leadIn)]); };
  const commit = (qs) => setT({ ...t, questions: normalize(qs) });
  const mergeImport = (tpl) => {
    setT((prev) => {
      const qs = normalize(tpl.questions || []);
      return {
        ...prev,
        name: prev.name && prev.name.trim() ? prev.name : (tpl.name || prev.name),
        introText: prev.introText && prev.introText.trim() ? prev.introText : (tpl.introText || prev.introText || ""),
        questions: qs,
        estMinutes: Math.max(2, Math.round(qs.length / 3)),
      };
    });
    setShowImport(false);
  };
  // Link the uploaded survey/input form as this template's source.
  const setSurveySource = ({ refId, fileName }) =>
    setT((prev) => ({ ...prev, sourceFileRef: refId, sourceFileName: fileName }));
  const mergeReportImport = (parsedReport) => {
    setT((prev) => ({
      ...prev,
      reportLayout: "custom",
      reportTitle: prev.reportTitle && prev.reportTitle.trim() ? prev.reportTitle : (parsedReport.title || prev.reportTitle || undefined),
      reportSections: parsedReport.sections || [],
    }));
    setShowReportImport(false);
  };
  // Link the uploaded report/summary form as this template's report source.
  const setReportSource = ({ refId, fileName }) =>
    setT((prev) => ({ ...prev, reportSourceFileRef: refId, reportSourceFileName: fileName }));
  const onLogoFile = (file) => {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const src = ev.target.result;
      const img = new Image();
      img.onload = () => {
        const MAX = 240;
        if (img.width <= MAX && img.height <= MAX) { setField("collegeLogo", src); return; }
        const scale = Math.min(MAX / img.width, MAX / img.height);
        const canvas = document.createElement("canvas");
        canvas.width = Math.round(img.width * scale);
        canvas.height = Math.round(img.height * scale);
        canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
        setField("collegeLogo", canvas.toDataURL("image/png"));
      };
      img.onerror = () => setField("collegeLogo", src);
      img.src = src;
    };
    reader.readAsDataURL(file);
  };
  const updateQ = (id, patch) => commit(t.questions.map((q) => (q.id === id ? { ...q, ...patch } : q)));
  const setLabel = (q, v, text) => {
    const labels = { ...(q.scale?.labels || {}) };
    if (text.trim()) labels[v] = text; else delete labels[v];
    updateQ(q.id, { scale: { ...q.scale, labels: Object.keys(labels).length ? labels : undefined } });
  };
  const toggleQuota = (q, on) => {
    if (on) {
      const seed = {}; (q.options || []).forEach((o) => { seed[o] = q.quota?.[o] ?? 0; });
      commit(t.questions.map((x) => (x.id === q.id ? { ...x, quota: seed, required: true } : (x.quota ? { ...x, quota: undefined } : x))));
    } else updateQ(q.id, { quota: undefined });
  };
  const setQuotaMin = (q, opt, n) => updateQ(q.id, { quota: { ...(q.quota || {}), [opt]: Math.max(0, n || 0) } });
  const changeType = (q, type) => {
    let qs = t.questions.map((x) => (x.id === q.id ? { ...x, type, ...(type === "rating" && !x.scale ? { scale: { min: 1, max: 5 } } : {}), ...((type === "choice" || type === "checkboxes") && !x.options ? { options: ["Option 1", "Option 2"] } : {}) } : x));
    if (!q.parentId && type !== "yn") qs = qs.filter((x) => x.parentId !== q.id); // only a yes/no question can hold sub-questions
    commit(qs);
  };
  const deleteQ = (id) => commit(t.questions.filter((x) => x.id !== id && x.parentId !== id));
  const addTop = (type) => {
    const base = { id: "e" + uid(), parentId: null, text: "" };
    const made = type === "yn" ? { ...base, type: "yn" }
      : type === "rating" ? { ...base, type: "rating", scale: { min: 1, max: 5 } }
      : type === "choice" ? { ...base, type: "choice", options: ["Option 1", "Option 2"], presentation: "radio", required: false }
      : type === "checkboxes" ? { ...base, type: "checkboxes", options: ["Option 1", "Option 2"], required: false }
      : { ...base, type: "text", required: false };
    commit([...t.questions, made]);
  };
  const addSub = (parentId, kind) => {
    const child = kind === "rating"
      ? { id: "e" + uid(), parentId, type: "rating", text: "", scale: { min: 1, max: 5 }, showWhen: { equals: "yes" } }
      : { id: "e" + uid(), parentId, type: "text", text: "Any comments?", required: false, showWhen: null };
    const qs = [...t.questions];
    let j = qs.findIndex((q) => q.id === parentId) + 1;
    while (j < qs.length && qs[j].parentId === parentId) j++;
    qs.splice(j, 0, child);
    commit(qs);
  };
  const moveBlock = (bi, dir) => { const bs = [...blocks]; const nj = bi + dir; if (nj < 0 || nj >= bs.length) return; [bs[bi], bs[nj]] = [bs[nj], bs[bi]]; commit(flatten(bs)); };
  const moveChild = (parentId, ci, dir) => {
    const block = blocks.find((b) => b.parent.id === parentId); if (!block) return;
    const ch = [...block.children]; const nj = ci + dir; if (nj < 0 || nj >= ch.length) return;
    [ch[ci], ch[nj]] = [ch[nj], ch[ci]];
    commit(flatten(blocks.map((b) => (b.parent.id === parentId ? { ...b, children: ch } : b))));
  };

  const typeSelect = (q, allowYN = true) => (
    <select value={q.type} onChange={(e) => changeType(q, e.target.value)} className="rounded-lg border p-1.5 text-xs bg-white" style={{ borderColor: BRAND.line, color: BRAND.ink }}>
      {allowYN && <option value="yn">Yes / No</option>}
      <option value="rating">Rating</option>
      {allowYN && <option value="choice">Multiple choice</option>}
      {allowYN && <option value="checkboxes">Checkboxes</option>}
      <option value="text">Free text</option>
    </select>
  );
  const typeControls = (q) => (
    <>
      {q.type === "rating" && (
        <span className="flex items-center gap-1.5 text-xs" style={{ color: BRAND.grey }}>
          scale
          <input type="number" value={q.scale?.min ?? 1} onChange={(e) => updateQ(q.id, { scale: { ...q.scale, min: parseInt(e.target.value || "1", 10) } })} className="w-12 rounded border p-1" style={{ borderColor: BRAND.line }} />
          to
          <input type="number" value={q.scale?.max ?? 5} onChange={(e) => updateQ(q.id, { scale: { ...q.scale, max: parseInt(e.target.value || "5", 10) } })} className="w-12 rounded border p-1" style={{ borderColor: BRAND.line }} />
          <label className="flex items-center gap-1 ml-1"><input type="checkbox" checked={!!q.scale?.na} onChange={(e) => updateQ(q.id, { scale: { ...q.scale, na: e.target.checked ? "Unable to assess" : undefined } })} /> "unable to assess"</label>
          {q.scale?.bands && <span>· bands preserved from import</span>}
        </span>
      )}
      {q.type === "rating" && !q.scale?.bands && (
        <div className="w-full mt-1 rounded-lg border p-2" style={{ borderColor: BRAND.line }}>
          <div className="text-xs font-semibold mb-1.5" style={{ color: BRAND.grey }}>Point labels (optional) — fill the ends for anchors, or every point for a fully-labelled scale</div>
          <div className="flex flex-wrap gap-2">
            {Array.from({ length: Math.max(0, (q.scale?.max ?? 5) - (q.scale?.min ?? 1) + 1) }, (_, i) => (q.scale?.min ?? 1) + i).map((v) => (
              <div key={v} className="flex items-center gap-1">
                <span className="text-xs font-bold w-4 text-center" style={{ color: BRAND.grey }}>{v}</span>
                <input value={(q.scale?.labels && q.scale.labels[v]) || ""} onChange={(e) => setLabel(q, v, e.target.value)} placeholder="—"
                  className="rounded border p-1 text-sm outline-none" style={{ borderColor: BRAND.line, color: BRAND.ink, width: 104 }} />
              </div>
            ))}
          </div>
        </div>
      )}
      {q.type === "choice" && (
        <span className="flex items-center gap-1.5 text-xs" style={{ color: BRAND.grey }}>
          show as
          <select value={q.presentation || "radio"} onChange={(e) => updateQ(q.id, { presentation: e.target.value })} className="rounded border p-1 bg-white" style={{ borderColor: BRAND.line }}>
            <option value="radio">buttons</option>
            <option value="dropdown">dropdown</option>
          </select>
          <label className="flex items-center gap-1 ml-1"><input type="checkbox" checked={!!q.required} onChange={(e) => updateQ(q.id, { required: e.target.checked })} /> mandatory</label>
        </span>
      )}
      {q.type === "checkboxes" && (
        <label className="flex items-center gap-1.5 text-xs" style={{ color: BRAND.grey }}>
          <input type="checkbox" checked={!!q.required} onChange={(e) => updateQ(q.id, { required: e.target.checked })} /> mandatory (≥1)
        </label>
      )}
      {q.type === "text" && (

// ADMIN VIEW — library · review queue · activity
// ─────────────────────────────────────────────────────────────────────────────
function TemplateTester({ template, onExit }) {
  const [view, setView] = useState("respondent"); // respondent | report
  const [campaign, setCampaign] = useState(() => ({
    id: "test-" + template.id,
    name: template.name + " — test",
    clinicianName: "Dr Test Clinician",
    templateId: template.id,
    templateVersion: template.version || 1,
    templateSnapshot: template,
    threshold: template.defaultThreshold || 15,
    status: "released",
    responses: Array.from({ length: template.defaultThreshold || 15 }, () => makeSampleResponse(template)),
  }));
  const update = (patch) => setCampaign((c) => ({ ...c, ...patch }));
  return (
    <div className="max-w-3xl mx-auto px-5 pb-20">
      <div className="flex items-start justify-between gap-3 mt-6 flex-wrap">
        <div>
          <Eyebrow>Template test · nothing here is saved</Eyebrow>
          <h2 className="font-serif text-2xl" style={{ color: BRAND.ink }}>{template.name}</h2>
        </div>
        <Btn kind="ghost" onClick={onExit}>Exit test</Btn>
      </div>
      <div className="flex gap-1 mt-4 p-1 rounded-xl" style={{ background: BRAND.plumSoft, maxWidth: 380 }}>
        {[["respondent", "Respondent view"], ["report", "Report view"]].map(([id, label]) => (
          <button key={id} onClick={() => setView(id)} className="flex-1 py-2.5 rounded-lg text-sm font-semibold"
            style={{ background: view === id ? "white" : "transparent", color: view === id ? BRAND.plum : BRAND.grey }}>
            {label}
          </button>
        ))}
      </div>
      {view === "respondent" ? (
        <div className="mt-4 rounded-2xl border" style={{ borderColor: BRAND.line }}>
          <SurveyRunner campaign={campaign} template={template}
            onSubmit={(resp) => update({ responses: [...campaign.responses, resp] })} />
          <div className="px-5 pb-4 text-center text-xs" style={{ color: BRAND.grey }}>
            Click-throughs are added to the simulated results in the Report view.
          </div>
        </div>
      ) : (
        <CampaignDetail campaign={campaign} template={template} embedded initialTab="results"
          libraryVersion={template.version} onBack={onExit} onUpdate={update} hideShare />
      )}
    </div>
  );
}

// ── Facilitator view: independent person who distributes & releases ─────────
function FacilitatorView({ data, setData, templates }) {
  const [detailId, setDetailId] = useState(null);
  const updateCampaign = (id, patch) =>
    setData({ ...data, campaigns: data.campaigns.map((c) => (c.id === id ? { ...c, ...patch } : c)) });

  const mine = data.campaigns.filter((c) => c.distribution === "facilitated");

  if (detailId) {
    const campaign = data.campaigns.find((c) => c.id === detailId);
    const template = campaign && tplFor(campaign, templates);
    if (campaign && template) {
      return (
        <CampaignDetail campaign={campaign} template={template} viewer="facilitator"
          libraryVersion={(templates.find((t) => t.id === campaign.templateId) || {}).version}
          onBack={() => setDetailId(null)}
          onUpdate={(patch) => updateCampaign(campaign.id, patch)} />
      );
    }
  }

  return (
    <div className="max-w-3xl mx-auto px-5 pb-20">
      <h2 className="font-serif text-2xl mt-6" style={{ color: BRAND.ink }}>Surveys you're facilitating</h2>
      <p className="text-sm mt-1 leading-relaxed" style={{ color: BRAND.grey }}>
        As an independent facilitator you distribute the survey, watch responses arrive, and release the
        summary to the clinician once enough have been collected. The clinician can't see results until you release them.
      </p>
      <div className="mt-5 space-y-3">
        {mine.length === 0 && (
          <Card>
            <p className="text-sm" style={{ color: BRAND.grey }}>
              No surveys assigned to you yet. When a clinician sets up a campaign and nominates you as
              their facilitator, it appears here.
            </p>
          </Card>
        )}
        {mine.map((c) => {
          const t = tplFor(c, templates);
          const n = c.responses.length;
          const rel = !!c.releasedToClinician;
          const met = n >= c.threshold;
          const chip = rel ? { t: "Released", bg: BRAND.plumSoft, fg: BRAND.plum } : met ? { t: "Ready to release", bg: "#E7F3EC", fg: BRAND.good } : { t: "Collecting", bg: BRAND.amberSoft, fg: "#8a5a13" };
          return (
            <button key={c.id} onClick={() => setDetailId(c.id)} className="w-full text-left">
              <Card className="hover:shadow-sm transition-shadow">
                <div className="flex items-center justify-between gap-3">
                  <div>
                    <div className="font-semibold" style={{ color: BRAND.ink }}>{c.name}</div>
                    <div className="text-sm mt-0.5" style={{ color: BRAND.grey }}>
                      {t?.name} · Subject: {c.clinicianName} · {n}/{c.threshold} responses{c.hideFromFacilitator ? " · results private" : ""}
                    </div>
                  </div>
                  <span className="text-xs font-semibold px-2.5 py-1 rounded-full shrink-0" style={{ background: chip.bg, color: chip.fg }}>{chip.t}</span>
                </div>
              </Card>
            </button>
          );
        })}
      </div>
    </div>
  );
}

// Admin library of every retained source form, cross-referenced to the templates
// and requests that use each one.
function SourceLibrary({ data }) {
  const [items, setItems] = useState(null); // null = loading
  useEffect(() => { let alive = true; listSourceFiles().then((x) => { if (alive) setItems(x); }); return () => { alive = false; }; }, []);
  const usage = useMemo(() => {
    const u = {};
    const add = (ref, label) => { if (ref) (u[ref] = u[ref] || []).push(label); };
    (data.customTemplates || []).forEach((t) => {
      add(t.sourceFileRef, `Survey source · ${t.name || "untitled"}`);
      add(t.reportSourceFileRef, `Report source · ${t.name || "untitled"}`);
    });
    (data.formRequests || []).forEach((r) => add(r.fileRef, `Request · ${r.name || r.fileName || "form"}`));
    return u;
  }, [data]);
  const fmtSize = (file) => {
    const bytes = file.encoding === "base64" ? Math.round((String(file.data).length * 3) / 4) : String(file.data).length;
    return bytes > 1048576 ? (bytes / 1048576).toFixed(1) + " MB" : Math.max(1, Math.round(bytes / 1024)) + " KB";
  };
  return (
    <div className="mt-5 space-y-3">
      <p className="text-sm leading-relaxed" style={{ color: BRAND.grey }}>
        Every original form kept on file — uploads sent in by clinicians and specimen forms imported when building templates. Originals stay available for reference and audit.
      </p>
      {items === null && <Card><p className="text-sm" style={{ color: BRAND.grey }}>Loading…</p></Card>}
      {items && items.length === 0 && <Card><p className="text-sm" style={{ color: BRAND.grey }}>No source forms on file yet. They appear here once a clinician submits a form or a specimen form is imported into a template.</p></Card>}
      {items && items.map(({ id, file }) => (
        <Card key={id}>
          <div className="flex items-center justify-between gap-3 flex-wrap">
            <div className="min-w-0 flex-1">
              <div className="font-semibold truncate" style={{ color: BRAND.ink }}>{file.name || "Untitled form"}</div>
              <div className="text-xs mt-0.5" style={{ color: BRAND.grey }}>
                {(file.encoding === "base64" ? "PDF" : "Text")} · {fmtSize(file)}
                {usage[id] ? " · " + usage[id].join(" · ") : " · not linked to a template"}
              </div>
            </div>
            <div className="flex items-center gap-2 shrink-0">
              <ViewSourceLink refId={id} fileName={file.name} label="View" />
              <Btn kind="ghost" onClick={() => downloadSourceFile(file)}>Download</Btn>
            </div>
          </div>
        </Card>
      ))}
    </div>
  );
}

function AdminView({ data, setData, templates }) {
  const [tab, setTab] = useState("library");
  const [screen, setScreen] = useState({ name: "home" }); // home | import | editor:{template}
  const [busy, setBusy] = useState(false);
  const [verifying, setVerifying] = useState(null); // id of submission being signed off
  const [reqError, setReqError] = useState(null);
  const [histId, setHistId] = useState(null);
  const [discardId, setDiscardId] = useState(null);
  const [removeId, setRemoveId] = useState(null);
  const openVersion = (t, snap) => setScreen({ name: "editor", template: { ...snap, id: t.id } });

  const upsertTemplate = (tpl) => {
    const exists = data.customTemplates.some((t) => t.id === tpl.id);
    const customTemplates = exists
      ? data.customTemplates.map((t) => (t.id === tpl.id ? tpl : t))
      : [...data.customTemplates, tpl];
    setData({ ...data, customTemplates });
  };
  const verify = (tpl, signoff) => upsertTemplate({ ...tpl, status: "verified", signoff: signoff || tpl.signoff, rejectNote: undefined, college: tpl.college || "Verified library template" });
  const addCollege = (name) => {
    const n = (name || "").trim();
    if (!n) return;
    const list = data.colleges || DEFAULT_COLLEGES;
    if (!list.includes(n)) setData({ ...data, colleges: [...list.filter((c) => c !== "Other"), n, "Other"] });
  };
  const reject = (id) => {
    const note = window.prompt("Optional note to the submitter (why it wasn't verified):", "");
    if (note === null) return;
    setData({ ...data, customTemplates: data.customTemplates.map((t) => (t.id === id ? { ...t, status: "rejected", rejectNote: note || undefined } : t)) });
  };
  const remove = (id) => setData({ ...data, customTemplates: data.customTemplates.filter((t) => t.id !== id), hiddenLibrary: Array.from(new Set([...(data.hiddenLibrary || []), id])) });
  const processRequest = async (r) => {
    setBusy(true); setReqError(null);
    try {
      const file = await loadSourceFile(r.fileRef);
      if (!file) throw new Error("the stored file could not be found");
      const content = file.encoding === "base64"
        ? [{ type: "document", source: { type: "base64", media_type: file.type || "application/pdf", data: file.data } }, { type: "text", text: PARSE_PROMPT }]
        : PARSE_PROMPT + "\n\n" + String(file.data).slice(0, 20000);
      const tpl = expandParsed(extractJSON(await callClaude(content)));
      setBusy(false);
      setScreen({ name: "editor", fromRequest: r.id, template: { ...tpl, id: "lib-" + uid(), name: r.name || tpl.name, source: "admin-import", status: "draft", sourceFileRef: r.fileRef } });
    } catch (e) {
      setBusy(false);
      setReqError(`Couldn't process "${r.name}" (${e.message}). Scanned PDFs can be hard for the model to read — you can still build the template manually and link the file.`);
    }
  };
  const declineRequest = (id) => setData({ ...data, formRequests: (data.formRequests || []).map((r) => (r.id === id ? { ...r, status: "declined" } : r)) });

  if (screen.name === "editor") {
    return (
      <TemplateEditor
        initial={screen.template}
        colleges={data.colleges || DEFAULT_COLLEGES}
        onAddCollege={addCollege}
        onCancel={() => { setScreen({ name: "home" }); setTab("library"); }}
        onSaveDraft={(tpl) => {
          const liveVerified = templates.find((t) => t.id === tpl.id && t.status === "verified");
          // Editing a live verified template: keep the live one untouched, store the edit as a
          // separate draft that points back at it. Otherwise (new template, or resuming a draft) keep id.
          const draft = (liveVerified && !tpl.draftOf)
            ? { ...tpl, id: "draft-" + uid(), draftOf: tpl.id, status: "draft" }
            : { ...tpl, status: "draft" };
          const exists = data.customTemplates.some((t) => t.id === draft.id);
          const customTemplates = exists ? data.customTemplates.map((t) => (t.id === draft.id ? draft : t)) : [...data.customTemplates, draft];
          setData({ ...data, customTemplates });
          setScreen({ name: "home" }); setTab("library");
        }}
        onSave={(tpl, signoff) => {
          const targetId = tpl.draftOf || tpl.id;
          const prior = templates.find((t) => t.id === targetId && t.status === "verified");
          const isEdit = !!(prior && prior.questions);
          const version = isEdit ? (prior.version || 1) + 1 : (tpl.version || 1);
          let history = prior && prior.history ? [...prior.history] : (tpl.history || []);
          if (isEdit) {
            const snap = { ...prior }; delete snap.history;
            history = [...history, { ...snap, archivedAt: new Date().toISOString() }].slice(-20);
          }
          const finalTpl = { ...tpl, id: targetId, draftOf: undefined, version, history, status: "verified", signoff: signoff || tpl.signoff, rejectNote: undefined, college: tpl.college || "Verified library template", savedAt: new Date().toISOString() };
          const exists = data.customTemplates.some((t) => t.id === finalTpl.id);
          let customTemplates = exists ? data.customTemplates.map((t) => (t.id === finalTpl.id ? finalTpl : t)) : [...data.customTemplates, finalTpl];
          if (tpl.draftOf && tpl.id !== targetId) customTemplates = customTemplates.filter((t) => t.id !== tpl.id); // drop the draft now it's committed
          const formRequests = screen.fromRequest
            ? (data.formRequests || []).map((r) => (r.id === screen.fromRequest ? { ...r, status: "imported", templateId: finalTpl.id } : r))
            : (data.formRequests || []);
          setData({ ...data, customTemplates, formRequests });
          setScreen({ name: "home" }); setTab(screen.fromRequest ? "requests" : "library");
        }}
      />
    );
  }
  if (screen.name === "test") {
    return <TemplateTester template={screen.template} onExit={() => { setScreen({ name: "home" }); setTab("library"); }} />;
  }

  // dashboard numbers
  const submitted = data.customTemplates.filter((t) => t.status === "submitted");
  const drafts = data.customTemplates.filter((t) => t.status === "draft");
  const pendingReqs = (data.formRequests || []).filter((r) => r.status === "requested");
  const libraryTemplates = templates.filter((t) => t.status === "verified");
  const realResponses = data.campaigns.reduce((a, c) => a + c.responses.length, 0);
  const mockResponses = MOCK_CLINICIANS.reduce((a, c) => a + c.responses, 0);
  const realRows = data.campaigns.length
    ? [{ name: "You (this device)", specialty: "—", campaigns: data.campaigns.length, responses: realResponses, unlocked: data.campaigns.filter((c) => c.responses.length >= c.threshold).length }]
    : [];

  return (
    <div className="max-w-3xl mx-auto px-5 pb-20">
      <div className="flex items-center justify-between mt-6 gap-3 flex-wrap">
        <h2 className="font-serif text-2xl" style={{ color: BRAND.ink }}>Administration</h2>
      </div>

      <div className="flex gap-1 mt-4 p-1 rounded-xl" style={{ background: BRAND.plumSoft }}>
        {[["library", "Library"], ["requests", `Requests${pendingReqs.length ? ` (${pendingReqs.length})` : ""}`], ["sources", "Source forms"], ["activity", "Activity"]].map(([id, label]) => (
          <button key={id} onClick={() => setTab(id)} className="flex-1 py-2.5 rounded-lg text-sm font-semibold"
            style={{ background: tab === id ? "white" : "transparent", color: tab === id ? BRAND.plum : BRAND.grey }}>
            {label}
          </button>
        ))}
      </div>

      {tab === "requests" && (
        <div className="mt-5 space-y-3">
          <p className="text-sm leading-relaxed" style={{ color: BRAND.grey }}>
            Forms uploaded by clinicians. Process one to run an AI draft from the stored file, then
            review, edit and verify it into the library. The original file stays linked to the template.
          </p>
          {busy && <div className="rounded-xl p-3 text-sm" style={{ background: BRAND.amberSoft, color: "#8a5a13" }}>Reading the form and drafting questions…</div>}
          {reqError && <div className="rounded-xl p-3 text-sm" style={{ background: "#FBEAE5", color: BRAND.bad }}>{reqError}</div>}
          {(data.formRequests || []).length === 0 && (
            <Card><p className="text-sm" style={{ color: BRAND.grey }}>No form requests yet. Clinicians can upload a form from their New campaign screen.</p></Card>
          )}
          {(data.formRequests || []).map((r) => (
            <Card key={r.id}>
              <div className="flex items-center justify-between gap-3 flex-wrap">
                <div className="flex-1 min-w-48">
                  <div className="font-semibold" style={{ color: BRAND.ink }}>{r.name}</div>
                  <div className="text-xs mt-0.5" style={{ color: BRAND.grey }}>File: {r.fileName}{r.note ? ` · note: ${r.note}` : ""}</div>
                  {r.fileRef && <div className="mt-1"><ViewSourceLink refId={r.fileRef} fileName={r.fileName} label="View uploaded form" /></div>}
                </div>
                <Badge status={r.status === "requested" ? "submitted" : r.status === "imported" ? "verified" : "rejected"} />
              </div>
              {r.status === "requested" && (
                <div className="mt-3 flex flex-wrap gap-2">
                  <Btn kind="good" disabled={busy} onClick={() => processRequest(r)}>{busy ? "Processing…" : "Process with AI"}</Btn>
                  <Btn kind="ghost" disabled={busy} onClick={() => declineRequest(r.id)}>Decline</Btn>
                </div>
              )}
              {r.status === "imported" && <div className="text-xs mt-2" style={{ color: BRAND.good }}>Added to the library.</div>}
            </Card>
          ))}
        </div>
      )}

      {tab === "library" && (
        <div className="mt-5 space-y-3">
          <div className="flex flex-wrap gap-2">
            <Btn onClick={() => setScreen({ name: "editor", template: blankTemplate() })}>Build new template</Btn>
          </div>
          {drafts.length > 0 && (
            <Card>
              <h3 className="font-serif text-base" style={{ color: BRAND.ink }}>Drafts <span className="text-xs font-normal" style={{ color: BRAND.grey }}>· not visible to clinicians</span></h3>
              <div className="mt-2 space-y-2">
                {drafts.map((d) => (
                  <div key={d.id} className="flex items-center justify-between gap-2 text-sm">
                    <span style={{ color: BRAND.ink }}>{d.name || "Untitled"} <span style={{ color: BRAND.grey }}>· {d.questions.length} questions{d.draftOf ? " · edit of a live template" : ""}</span></span>
                    <div className="flex gap-2">
                      {discardId === d.id ? (
                        <>
                          <Btn kind="ghost" onClick={() => setDiscardId(null)}>Keep</Btn>
                          <Btn kind="primary" onClick={() => { setData({ ...data, customTemplates: data.customTemplates.filter((t) => t.id !== d.id) }); setDiscardId(null); }}>Confirm discard</Btn>
                        </>
                      ) : (
                        <>
                          <Btn kind="ghost" onClick={() => setScreen({ name: "editor", template: d })}>Continue</Btn>
                          <Btn kind="ghost" onClick={() => setScreen({ name: "test", template: d })}>Test</Btn>
                          <Btn kind="ghost" onClick={() => setDiscardId(d.id)}>Discard</Btn>
                        </>
                      )}
                    </div>
                  </div>
                ))}
              </div>
            </Card>
          )}
          {libraryTemplates.map((t) => {
            const history = t.history || [];
            return (
              <Card key={t.id}>
                <div className="flex items-center justify-between gap-3 flex-wrap">
                  <div className="flex-1 min-w-48">
                    <div className="font-semibold" style={{ color: BRAND.ink }}>{t.name}</div>
                    <div className="text-xs mt-0.5" style={{ color: BRAND.grey }}>
                      {t.college} · v{t.version || 1} · {t.questions.length} questions · source: {t.source}
                      {t.signoff && <> · licence: {t.signoff.licensing === "not_required" ? "not required" : "confirmed"}</>}
                    </div>
                    {(t.sourceFileRef || t.reportSourceFileRef) && (
                      <div className="mt-1.5 flex flex-wrap items-center gap-3">
                        <DownloadSourceLink refId={t.sourceFileRef} fileName={t.sourceFileName} label="Download survey form" />
                        <DownloadSourceLink refId={t.reportSourceFileRef} fileName={t.reportSourceFileName} label="Download report form" />
                      </div>
                    )}
                  </div>
                  <div className="flex items-center gap-2">
                    <Badge status="verified" />
                    {history.length > 0 && (
                      <button onClick={() => setHistId(histId === t.id ? null : t.id)} className="text-sm font-semibold" style={{ color: BRAND.plum }}>
                        History ({history.length})
                      </button>
                    )}
                    {removeId === t.id ? (
                      <>
                        <Btn kind="ghost" onClick={() => setRemoveId(null)}>Keep</Btn>
                        <Btn kind="primary" onClick={() => { remove(t.id); setRemoveId(null); }}>Confirm remove</Btn>
                      </>
                    ) : (
                      <>
                        <Btn kind="ghost" onClick={() => setScreen({ name: "editor", template: t })}>Edit</Btn>
                        <Btn kind="ghost" onClick={() => setScreen({ name: "test", template: t })}>Test</Btn>
                        <Btn kind="ghost" onClick={() => setRemoveId(t.id)}>Remove</Btn>
                      </>
                    )}
                  </div>
                </div>
                {histId === t.id && (
                  <div className="mt-3 border-t pt-2 space-y-1.5" style={{ borderColor: BRAND.line }}>
                    <div className="text-xs font-semibold" style={{ color: BRAND.ink }}>Earlier versions</div>
                    {[...history].reverse().map((h, i) => (
                      <div key={i} className="flex items-center justify-between gap-2 text-xs">
                        <span style={{ color: BRAND.grey }}>
                          v{h.version} · {h.archivedAt ? new Date(h.archivedAt).toLocaleDateString() : "original"} · {h.questions.length} questions
                        </span>
                        <button onClick={() => openVersion(t, h)} className="font-semibold whitespace-nowrap" style={{ color: BRAND.plum }}>Restore to editor →</button>
                      </div>
                    ))}
                    <div className="text-[11px] pt-1" style={{ color: BRAND.grey }}>Restoring opens the version in the editor; saving re-verifies it as a new version.</div>
                  </div>
                )}
              </Card>
            );
          })}
        </div>
      )}

      {tab === "sources" && <SourceLibrary data={data} />}

      {tab === "activity" && (
        <div className="mt-5 space-y-4">
          <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
            {[["Clinicians", MOCK_CLINICIANS.length + realRows.length], ["Library templates", libraryTemplates.length], ["Campaigns", data.campaigns.length + MOCK_CLINICIANS.reduce((a, c) => a + c.campaigns, 0)], ["Responses", realResponses + mockResponses]].map(([label, val]) => (
              <Card key={label} className="!p-4 text-center">
                <div className="font-serif text-2xl" style={{ color: BRAND.ink }}>{val}</div>
                <div className="text-xs mt-0.5" style={{ color: BRAND.grey }}>{label}</div>
              </Card>
            ))}
          </div>
          <Card>
            <h3 className="font-serif text-lg" style={{ color: BRAND.ink }}>Activity by clinician</h3>
            <p className="text-xs mt-1" style={{ color: BRAND.grey }}>
              Aggregate counts only — by design, no individual responses or comments are ever visible to
              an administrator. Rows below other than your own are illustrative sample data.
            </p>
            <div className="mt-3 overflow-hidden rounded-lg border" style={{ borderColor: BRAND.line }}>
              <div className="grid grid-cols-5 text-xs font-semibold px-3 py-2" style={{ background: BRAND.paper, color: BRAND.ink }}>
                <div className="col-span-2">Clinician</div><div>Campaigns</div><div>Responses</div><div>Unlocked</div>
              </div>
              {[...realRows, ...MOCK_CLINICIANS].map((c, i) => (
                <div key={i} className="grid grid-cols-5 text-xs px-3 py-2 border-t" style={{ borderColor: BRAND.line, color: BRAND.ink }}>
                  <div className="col-span-2">{c.name}<span className="block" style={{ color: BRAND.grey }}>{c.specialty}</span></div>
                  <div>{c.campaigns}</div><div>{c.responses}</div><div>{c.unlocked}</div>
                </div>
              ))}
            </div>
          </Card>
        </div>
      )}
    </div>
  );
}

function App() {
  const [data, setDataState] = useState(null);
  const [view, setView] = useState("clinician");
  const [adminUnlocked, setAdminUnlocked] = useState(false);
  const adminClickTimes = React.useRef([]);

  useEffect(() => { (async () => { const loaded = await loadAll(); setDataState(loaded ? { ...DEFAULT_DATA, ...loaded } : DEFAULT_DATA); })(); }, []);
  const setData = (d) => { setDataState(d); saveAll(d); };

  if (!data) {
    return (
      <div className="min-h-screen flex items-center justify-center" style={{ background: BRAND.paper }}>
        <div className="text-sm" style={{ color: BRAND.grey }}>Loading…</div>
      </div>
    );
  }

  const overridden = new Set(data.customTemplates.map((t) => t.id));
  const hiddenLib = data.hiddenLibrary || [];
  const templates = [...LIBRARY.filter((l) => !hiddenLib.includes(l.id) && !overridden.has(l.id)), ...data.customTemplates];
  const addResponse = (campaignId, resp) =>
    setData({ ...data, campaigns: data.campaigns.map((c) => (c.id === campaignId ? { ...c, responses: [...c.responses, resp] } : c)) });

  return (
    <div className="min-h-screen font-sans" style={{ background: BRAND.paper }}>
      <header className="print:hidden" style={{ background: BRAND.plumDeep }}>
        <div className="max-w-3xl mx-auto px-5 py-4 flex items-center justify-between gap-3 flex-wrap">
          <BrandMark dark size="lg" hideProductOnMobile />
          <div className="flex rounded-xl p-1" style={{ background: "rgba(255,255,255,0.12)" }}>
            {[["respondent", "Respondent"], ["clinician", "Clinician"], ["facilitator", "Facilitator"]].map(([id, label]) => (
              <button key={id} onClick={() => setView(id)} className="px-3.5 py-2 rounded-lg text-sm font-semibold"
                style={{ background: view === id ? "white" : "transparent", color: view === id ? BRAND.plumDeep : "rgba(255,255,255,0.75)" }}>
                {label}
              </button>
            ))}
            <button
              onClick={() => {
                if (adminUnlocked) { setView("admin"); return; }
                const now = Date.now();
                adminClickTimes.current = [...adminClickTimes.current, now].filter(t => now - t < 2000);
                if (adminClickTimes.current.length >= 5) {
                  adminClickTimes.current = [];
                  setAdminUnlocked(true);
                  setView("admin");
                }
              }}
              className="px-3.5 py-2 rounded-lg text-sm font-semibold flex items-center gap-1.5"
              style={{ background: view === "admin" ? "white" : "transparent", color: view === "admin" ? BRAND.plumDeep : "rgba(255,255,255,0.75)" }}
            >
              {!adminUnlocked && (
                <svg width="11" height="13" viewBox="0 0 11 13" fill="none" xmlns="http://www.w3.org/2000/svg" style={{ opacity: 0.6, flexShrink: 0 }}>
                  <rect x="1" y="5.5" width="9" height="7" rx="1.5" stroke="currentColor" strokeWidth="1.4"/>
                  <path d="M3 5.5V3.5a2.5 2.5 0 0 1 5 0v2" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round"/>
                </svg>
              )}
              Admin
            </button>
          </div>
        </div>
        <div className="text-center text-xs py-1.5 px-3" style={{ background: BRAND.amber, color: BRAND.plumDeep }}>
          Prototype — respondents, clinicians, facilitators and administrators use separate links in production; this switcher exists only for demonstration.
        </div>
      </header>

      {view === "respondent" && <RespondentView campaigns={data.campaigns} templates={templates} onSubmit={addResponse} />}
      {view === "clinician" && <ClinicianView data={data} setData={setData} templates={templates} />}
      {view === "facilitator" && <FacilitatorView data={data} setData={setData} templates={templates} />}
      {view === "admin" && <AdminView data={data} setData={setData} templates={templates} />}
    </div>
  );
}


    // Wrapper: removes loading screen after first render
    function AppWithLoader() {
      useEffect(() => {
        const el = document.getElementById('loading');
        if (el) {
          el.classList.add('fade-out');
          setTimeout(() => el.remove(), 350);
        }
      }, []);
      return <App />;
    }

    const container = document.getElementById('root');
    ReactDOM.createRoot(container).render(<AppWithLoader />);
  </script>

</body>
</html>
