// A released campaign keeps its own snapshot of the template, so later edits to a
// library template never change what a live campaign is collecting. Older campaigns
// saved before snapshots existed fall back to a live lookup by id.
const tplFor = (campaign, templates) => campaign.templateSnapshot || templates.find((t) => t.id === campaign.templateId);

// Derive display numbers: top-level questions get 1,2,3…; sub-questions get the
// parent's number plus a,b,c…  Assumes sub-questions immediately follow their parent.
function withNumbers(questions) {
  let group = 0, childCode = 96;
  return questions.map((q) => {
    if (!q.parentId) {
      if (q.leadIn) { childCode = 96; return { ...q, label: "" }; } // lead-in questions (role/demographics) are asked first and unnumbered
      group += 1; childCode = 96; return { ...q, label: String(group) };
    }
    childCode += 1;
    return { ...q, label: `${group}${String.fromCharCode(childCode)}` };
  });
}

// A sub-question with a showWhen condition is visible only when its parent's answer matches.
function isVisible(q, answers) {
  if (!q.parentId || !q.showWhen) return true;
  const parent = answers[q.parentId];
  return !!parent && parent.yn === q.showWhen.equals;
}

// Group a flat question list into { parent, children } blocks for editing/reporting.
function toBlocks(questions) {
  const blocks = [];
  for (const q of questions) {
    if (!q.parentId) blocks.push({ parent: q, children: [] });
    else if (blocks.length) blocks[blocks.length - 1].children.push(q);
  }
  return blocks;
}
function fromBlocks(blocks) {
  const out = [];
  for (const b of blocks) {
    out.push({ ...b.parent, parentId: null });
    for (const c of b.children) out.push({ ...c, parentId: b.parent.id });
  }
  return out;
}

// ── storage ──────────────────────────────────────────────────────────────────
async function loadAll() {
  try { const r = await window.storage.get(STORAGE_KEY); return r && r.value ? JSON.parse(r.value) : null; }
  catch { return null; }
}
async function saveAll(d) {
  try { await window.storage.set(STORAGE_KEY, JSON.stringify(d)); } catch (e) { console.error(e); }
}
// Uploaded source forms are kept under their own storage keys so the main data
// blob stays small (the 5MB-per-key limit applies per key). A request/template
// only stores a lightweight reference (fileRef) to the bytes.
async function saveSourceFile(id, file) {
  try {
    const payload = JSON.stringify(file);
    if (payload.length > 4800000) return false; // ~5MB per-key storage cap (base64 inflates raw bytes ~33%)
    await window.storage.set("srcfile:" + id, payload);
    return true;
  } catch (e) { console.error(e); return false; }
}
async function loadSourceFile(id) {
  try { const r = await window.storage.get("srcfile:" + id); return r && r.value ? JSON.parse(r.value) : null; } catch { return null; }
}
// Enumerate every retained source form (for the admin Source-forms library).
async function listSourceFiles() {
  try {
    const res = await window.storage.list("srcfile:");
    const keys = (res && res.keys) || [];
    const out = [];
    for (const k of keys) {
      const id = String(k).replace(/^srcfile:/, "");
      const file = await loadSourceFile(id);
      if (file) out.push({ id, file });
    }
    return out;
  } catch (e) { console.error(e); return []; }
}

const toCSV = (rows) => rows.map((r) => r.map(csvCell).join(",")).join("\n");
function downloadText(filename, text, mime = "text/csv;charset=utf-8;") {
  try {
    const blob = new Blob([text], { type: mime });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  } catch (e) { console.error(e); }
}

// ── Claude API helpers (artifact-native) ─────────────────────────────────────
async function callClaude(content) {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: 1000, messages: [{ role: "user", content }] }),
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message || "API error");
  return (data.content || []).filter((b) => b.type === "text").map((b) => b.text).join("\n");
}
function extractJSON(text) {
  const clean = text.replace(/```json|```/g, "").replace(/```/g, "").trim();
  const start = clean.indexOf("{");
  if (start === -1) throw new Error("the model didn't return JSON");
  const body = clean.slice(start);
  // Fast path: response is well-formed.
  const lastBrace = body.lastIndexOf("}");
  if (lastBrace !== -1) {
    try { return JSON.parse(body.slice(0, lastBrace + 1)); } catch (_) { /* fall through to salvage */ }
  }
  // Salvage path: the response was likely truncated. Recover top-level fields and
  // every COMPLETE question object, discarding only a partial trailing one.
  const obj = {};
  const nameM = body.match(/"name"\s*:\s*"((?:[^"\\]|\\.)*)"/);
  if (nameM) { try { obj.name = JSON.parse('"' + nameM[1] + '"'); } catch (_) {} }
  obj.questions = [];
  const qKey = body.indexOf('"questions"');
  const arrStart = qKey === -1 ? -1 : body.indexOf("[", qKey);
  if (arrStart !== -1) {
    let depth = 0, objStart = -1, inStr = false, esc = false;
    for (let i = arrStart + 1; i < body.length; i++) {
      const ch = body[i];
      if (inStr) {
        if (esc) esc = false;
        else if (ch === "\\") esc = true;
        else if (ch === '"') inStr = false;
        continue;
      }
      if (ch === '"') inStr = true;
      else if (ch === "{") { if (depth === 0) objStart = i; depth++; }
      else if (ch === "}") { depth--; if (depth === 0 && objStart !== -1) { try { obj.questions.push(JSON.parse(body.slice(objStart, i + 1))); } catch (_) {} objStart = -1; } }
      else if (ch === "]" && depth === 0) break;
    }
  }
  if (!obj.questions.length) throw new Error("couldn't read any questions — the response may have been cut off");
  return obj;
}

const PARSE_PROMPT = `You convert a clinical feedback form into a survey definition as JSON.

QUESTION TYPES:
- "yn" = yes/no
- "r"  = numeric rating
- "ch" = single-select (radio buttons or dropdown)
- "cb" = checkboxes (select one or more)
- "tx" = free text

CONDITIONAL FOLLOW-UPS (critical — never drop): A yes/no question is often followed by a sub-part asked only when the answer is yes (e.g. "If yes, how well was it managed?"). Attach it to the SAME yes/no object — never emit it as a separate question:
- follow-up rating → set "rl" (label) + "min"/"max" (scale bounds)
- follow-up comment → set "c": true

TOP-LEVEL FIELDS:
- "demographics": {"gender": bool, "age": bool} — set true if the form collects gender or age as named lead-in items before the main questions.
- "introText": the form's preamble or introduction, copied verbatim if present (omit key if none).

function expandParsed(parsed, opts = {}) {
  const questions = [];

  // Demographic lead-in questions (prepended before numbered questions, matching PES structure)
  const demo = parsed.demographics || {};
  if (demo.gender) {
    questions.push({ id: "d-gender", parentId: null, leadIn: true, type: "choice", presentation: "radio", demographic: "gender", required: false, text: "Please tell us your gender", options: [...GENDERS] });
  }
  if (demo.age) {
    questions.push({ id: "d-age", parentId: null, leadIn: true, type: "choice", presentation: "dropdown", demographic: "age", required: false, text: "Please tell us your age", options: [...AGE_BANDS] });
  }

  (parsed.questions || []).slice(0, 25).forEach((q, i) => {
    const pid = "g" + i;
    const base = { id: pid, parentId: null, text: String(q.q || "Untitled question"), description: q.d || undefined };
    if (q.t === "yn") {
      questions.push({ ...base, type: "yn" });
      // "If yes" follow-up rating → conditional sub-question.
      if (q.rl) questions.push({ id: pid + "a", parentId: pid, type: "rating", text: String(q.rl), scale: { min: q.min || 1, max: q.max || 5 }, showWhen: { equals: "yes" } });
      // Comment → sub-question, shown regardless, optional by default.
      if (q.c) questions.push({ id: pid + (q.rl ? "b" : "a"), parentId: pid, type: "text", text: "Are there any comments you would like to make?", required: false });
    } else if (q.t === "r") {
      questions.push({ ...base, type: "rating", scale: { min: q.min || 1, max: q.max || 5 } });
    } else if (q.t === "ch") {
      const safeOpts = Array.isArray(q.opts) && q.opts.length >= 2 ? q.opts.map(String) : ["Option 1", "Option 2"];
      questions.push({ ...base, type: "choice", options: safeOpts, presentation: q.pres === "drop" ? "dropdown" : "radio", required: !!q.req });
    } else if (q.t === "cb") {
      const safeOpts = Array.isArray(q.opts) && q.opts.length >= 2 ? q.opts.map(String) : ["Option 1", "Option 2"];
      questions.push({ ...base, type: "checkboxes", options: safeOpts, required: !!q.req });
    } else {
      questions.push({ ...base, type: "text", required: !!q.req });
    }
  });
  return {
    id: "gen-" + uid(),
    name: parsed.name || "Generated survey",
    college: opts.college || "Other",
    status: opts.status || "private",
    version: 1,
    source: opts.source || "generated",
    introText: parsed.introText || "",
    subjectLabel: "Name of the person receiving feedback",
    description: "AI-generated from an uploaded form. Review carefully before release.",
    defaultThreshold: 10,
    thresholdNote: "Suggested minimum — check the requirements of your CPD program.",
    reportLayout: "auto",
    estMinutes: Math.max(2, Math.round(questions.length / 3)),
    questions,
  };
}

// Reads a college SUMMARY / REPORT form (the blank sheet results are collated

const REPORT_PARSE_PROMPT = `You are given a clinical feedback SUMMARY / REPORT form — the blank sheet onto which collated, anonymous results are written (NOT the survey that respondents fill in). Infer the structure of the report as an ordered list of sections.

SECTION TYPES:
- "heading"  = a section title or divider (carry its text)
- "narrative"= a paragraph of explanatory / methodology / preamble prose (carry its text verbatim, trimmed)
- "demo"     = a breakdown of a single respondent characteristic (gender, age, role, etc). Carry "tag" (one of "gender","age","role","other") and "display" ("inline" for a short list, "table" for a row/column table)
- "questions"= a block presenting the per-question results (rating distributions, yes/no, choices). Use this wherever the form lays out question-by-question result rows or tables.
- "comments" = a block collating free-text / written comments.

RULES:
- Output ONLY the sections that the report form itself contains, in the order they appear.
- Do NOT invent question wording or reference specific question numbers — the "questions" and "comments" sections summarise the whole instrument; finer selection is done later by a human.
- Prefer one "questions" section for the main body unless the form clearly separates distinct result groups under their own headings.
- For "demo", map gender/sex → "gender", age/age band → "age", role/profession/relationship → "role", anything else → "other".

Respond with ONLY a single-line minified JSON object, no markdown, no commentary:
{"title":string(the report's title, omit if none),"sections":[{"type":"heading"|"narrative"|"demo"|"questions"|"comments","text":string(heading/narrative only),"tag":"gender"|"age"|"role"|"other"(demo only),"display":"inline"|"table"(demo only)}]}

// Bind the parsed skeleton onto a concrete template. Defensive: tolerates missing
// fields, drops unknown section types, binds demo tags to tagged questions by
// q.demographic (leaving questionId unset when there's no match — the designer
// then shows a soft warning and a picker).
function expandReportParsed(parsed, template) {
  const qs = (template && template.questions) || [];
  const byTag = {};
  qs.forEach((q) => { if (q.demographic && !byTag[q.demographic]) byTag[q.demographic] = q.id; });
  const rawSections = Array.isArray(parsed && parsed.sections) ? parsed.sections : [];
  const sections = [];
  rawSections.forEach((s) => {
    if (!s || typeof s !== "object") return;
    if (s.type === "heading") {
      sections.push({ type: "heading", text: String(s.text || "") });
    } else if (s.type === "narrative") {
      sections.push({ type: "narrative", text: String(s.text || "") });
    } else if (s.type === "demo" || s.type === "demographic") {
      const tag = s.tag === "gender" || s.tag === "age" || s.tag === "role" ? s.tag : "other";
      sections.push({ type: "demographic", questionId: byTag[tag], display: s.display === "table" ? "table" : "inline" });
    } else if (s.type === "questions") {
      sections.push({ type: "questions", scope: "all" });
    } else if (s.type === "comments") {
      sections.push({ type: "comments", scope: "all" });
    }
    // unknown types are dropped
  });
  return { title: parsed && parsed.title ? String(parsed.title) : undefined, sections };
}

const pick = (a) => a[Math.floor(Math.random() * a.length)];
const chance = (p) => Math.random() < p;

function makeSampleResponse(template, forced) {
  const answers = {};
  for (const q of template.questions) {
    if (!isVisible(q, answers)) continue; // don't fabricate answers for hidden sub-questions
    if (q.type === "yn") {
      const negativeQ = /rushed/i.test(q.text);
      const symptomQ = /pain|nause|cold|shiver|scared|anxious/i.test(q.text);
      const yes = negativeQ ? chance(0.12) : symptomQ ? chance(0.5) : chance(0.85);
      answers[q.id] = { yn: yes ? "yes" : "no" };
    } else if (q.type === "rating") {
      if (q.scale?.na && chance(0.08)) { answers[q.id] = { na: true }; continue; }
      const span = q.scale.max - q.scale.min;
      answers[q.id] = { rating: Math.min(q.scale.max, q.scale.min + Math.round(span * (0.6 + Math.random() * 0.4))) };
    } else if (q.type === "choice") {
      const opts = q.options || [];
      answers[q.id] = opts.length ? { choice: pick(opts) } : {};
    } else if (q.type === "checkboxes") {
      const opts = q.options || [];
      const chosen = opts.filter(() => chance(0.4));
      answers[q.id] = { choices: chosen.length ? chosen : (opts.length ? [pick(opts)] : []) };
    } else { // text / comment
      const pool = PES_COMMENTS[q.id] || PES_COMMENTS[q.parentId] || GENERIC_COMMENTS;
      answers[q.id] = { comment: (q.required || chance(0.5)) ? pick(pool) : "" };
    }
  }
  if (forced) for (const qid in forced) answers[qid] = forced[qid];
  return { answers };
}

// ── stats ────────────────────────────────────────────────────────────────────
function computeStats(template, responses) {
  const byQ = {};
  for (const q of template.questions) {
    const s = { yes: 0, no: 0, dist: {}, ratingN: 0, na: 0, comments: [], sum: 0, opts: {}, pickedN: 0 };
    for (const r of responses) {
      const a = r.answers?.[q.id];
      if (!a) continue;
      if (a.yn === "yes") s.yes++;
      if (a.yn === "no") s.no++;
      if (a.na) s.na++;
      if (typeof a.rating === "number") { s.dist[a.rating] = (s.dist[a.rating] || 0) + 1; s.ratingN++; s.sum += a.rating; }
      if (a.comment && a.comment.trim()) s.comments.push(a.comment.trim());
      if (a.choice) { s.opts[a.choice] = (s.opts[a.choice] || 0) + 1; s.pickedN++; }
      if (Array.isArray(a.choices) && a.choices.length) { a.choices.forEach((o) => { s.opts[o] = (s.opts[o] || 0) + 1; }); s.pickedN++; }
    }
    s.mean = s.ratingN ? s.sum / s.ratingN : null;
    s.comments.sort((a, b) => a.localeCompare(b)); // order reveals nothing about response order
    byQ[q.id] = s;
  }
  return { byQ };
}

function RatingScale({ scale, value, na, onChange, onNA, compactLabel }) {
  const { min, max, bands, labels } = scale;
  const values = []; for (let v = min; v <= max; v++) values.push(v);
  const lab = (v) => (labels && labels[v] && String(labels[v]).trim()) ? String(labels[v]) : "";
  const anyLabel = values.some((v) => lab(v));
  const allLabel = values.length > 0 && values.every((v) => lab(v));
  const btn = (v) => (

              {lab(v)}

      ) : (

}

function MockQR({ seed }) {
  const cells = useMemo(() => {
    let h = 2166136261;
    for (let i = 0; i < seed.length; i++) { h ^= seed.charCodeAt(i); h = Math.imul(h, 16777619); }
    const rand = () => { h ^= h << 13; h ^= h >>> 17; h ^= h << 5; return ((h >>> 0) % 100) / 100; };
    const g = [];
    for (let r = 0; r < 21; r++) for (let c = 0; c < 21; c++) {
      const f = (r < 7 && c < 7) || (r < 7 && c > 13) || (r > 13 && c < 7);
      if (f) {
        const rr = r > 13 ? r - 14 : r, cc = c > 13 ? c - 14 : c;
        if (rr === 0 || rr === 6 || cc === 0 || cc === 6 || (rr >= 2 && rr <= 4 && cc >= 2 && cc <= 4)) g.push([r, c]);
      } else if (rand() > 0.52) g.push([r, c]);
    }
    return g;
  }, [seed]);
  return (
    <div className="text-center">
      <svg viewBox="0 0 21 21" className="w-32 h-32 bg-white rounded-lg p-1 border inline-block" style={{ borderColor: BRAND.line }}>
        {cells.map(([r, c], i) => <rect key={i} x={c} y={r} width="1" height="1" fill={BRAND.ink} />)}
      </svg>
      <div className="text-xs mt-1" style={{ color: BRAND.grey }}>Demo QR — live link in production</div>
    </div>
  );
}

  const [answers, setAnswers] = useState({});
  const [done, setDone] = useState(false);

  const labels = useMemo(() => Object.fromEntries(withNumbers(template.questions).map((x) => [x.id, x.label])), [template.questions]);
  const topLevel = template.questions.filter((x) => !x.parentId);
  const qStart = 1;
  const screenIndex = step - qStart;
  const p = screenIndex >= 0 && screenIndex < topLevel.length ? topLevel[screenIndex] : null;
  const visKids = p ? template.questions.filter((c) => c.parentId === p.id && isVisible(c, answers)) : [];

  const setAnswer = (id, patch) => setAnswers((a) => ({ ...a, [id]: { ...(a[id] || {}), ...patch } }));
  // Answering a yes/no prunes conditional children that no longer apply, so a hidden
  // sub-question can never leave a stale answer behind in the results.
  const answerYesNo = (parent, v) => setAnswers((a) => {
    const next = { ...a, [parent.id]: { ...(a[parent.id] || {}), yn: v } };
    for (const child of template.questions) {
      if (child.parentId === parent.id && child.showWhen && child.showWhen.equals !== v) delete next[child.id];
    }
    return next;
  });

  const answeredOk = (q) => {
    const a = answers[q.id] || {};
    if (q.type === "yn") return !!a.yn;
    if (q.type === "rating") return typeof a.rating === "number" || !!a.na;
    if (q.type === "choice") return !q.required || !!a.choice;
    if (q.type === "checkboxes") return !q.required || (Array.isArray(a.choices) && a.choices.length > 0);
    return !q.required || !!(a.comment && a.comment.trim());
  };
  // Advance once the main question is answered and any visible required comments are filled;
  // ratings and optional comments never block.
  const canAdvance = !p || (answeredOk(p) && visKids.every((c) => (c.type === "text" ? answeredOk(c) : true)));
  const isLast = screenIndex >= topLevel.length - 1;

  const field = (q) => {
    const a = answers[q.id] || {};
    if (q.type === "yn") return <YesNo value={a.yn} onChange={(v) => answerYesNo(q, v)} />;
    if (q.type === "rating") return (
      <RatingScale scale={q.scale} value={a.rating} na={a.na}
        onChange={(n) => setAnswer(q.id, { rating: n, na: false })}
        onNA={() => setAnswer(q.id, { na: !a.na, rating: undefined })} />
    );
    if (q.type === "choice") {
      const opts = q.options || [];
      if (q.presentation === "dropdown") return (
        <select value={a.choice || ""} onChange={(e) => setAnswer(q.id, { choice: e.target.value })}
          className="w-full rounded-xl border-2 p-3 text-base bg-white outline-none" style={{ borderColor: BRAND.line, color: BRAND.ink }}>
          <option value="">{q.required ? "Select one…" : "Select one (optional)…"}</option>
          {opts.map((o) => <option key={o} value={o}>{o}</option>)}
        </select>
      );
      return (
        <div className="space-y-2">
          {opts.map((o) => (
            <button key={o} onClick={() => setAnswer(q.id, { choice: o })} className="w-full text-left px-4 py-3 rounded-xl border-2 text-base"
              style={{ borderColor: a.choice === o ? BRAND.plum : BRAND.line, background: a.choice === o ? BRAND.plumSoft : "white", color: BRAND.ink }}>
              {o}
            </button>
          ))}
        </div>
      );
    }
    if (q.type === "checkboxes") {
      const opts = q.options || [];
      const cur = Array.isArray(a.choices) ? a.choices : [];
      return (
        <div className="space-y-2">
          {opts.map((o) => {
            const sel = cur.includes(o);
            return (
              <button key={o} onClick={() => setAnswer(q.id, { choices: sel ? cur.filter((x) => x !== o) : [...cur, o] })}
                className="w-full text-left px-4 py-3 rounded-xl border-2 text-base flex items-center gap-3"
                style={{ borderColor: sel ? BRAND.plum : BRAND.line, background: sel ? BRAND.plumSoft : "white", color: BRAND.ink }}>
                <span className="w-5 h-5 rounded border-2 flex items-center justify-center shrink-0 text-xs" style={{ borderColor: sel ? BRAND.plum : BRAND.line, background: sel ? BRAND.plum : "white", color: "white" }}>{sel ? "✓" : ""}</span>
                {o}
              </button>
            );
          })}
        </div>
      );
    }
    return (
      <>
        {q.required && <div className="text-sm mb-2 font-medium" style={{ color: BRAND.amber }}>A response is required.</div>}
        <textarea rows={3} value={a.comment || ""} onChange={(e) => setAnswer(q.id, { comment: e.target.value })}
          className="w-full rounded-xl border-2 p-3 text-base outline-none" style={{ borderColor: BRAND.line, color: BRAND.ink }}
          placeholder={q.required ? "Your response…" : "Your comments (optional)…"} />
      </>
    );
  };

  if (done) {
    return (
      <div className="max-w-md mx-auto px-5 py-16 text-center">
        <div className="w-16 h-16 mx-auto rounded-full flex items-center justify-center text-3xl text-white" style={{ background: BRAND.good }}>✓</div>
        <h2 className="font-serif text-2xl mt-6" style={{ color: BRAND.ink }}>Thank you</h2>
        <p className="mt-3 text-sm leading-relaxed" style={{ color: BRAND.grey }}>
          Your feedback was recorded anonymously. {campaign.clinicianName} will only ever see
          combined results once enough responses are in.
        </p>
        <button className="mt-8 text-sm underline" style={{ color: BRAND.plum }}
          onClick={() => { setDone(false); setStep(0); setAnswers({}); }}>
          Start a new response (demo)
        </button>
      </div>
    );
  }

  const progress = Math.min(step / (qStart + topLevel.length), 1);

  return (
    <div className="max-w-md mx-auto px-5 pb-16">
      <div className="h-1 rounded-full mt-4 mb-8 overflow-hidden" style={{ background: BRAND.line }}>
        <div className="h-full rounded-full transition-all duration-300" style={{ width: `${progress * 100}%`, background: BRAND.amber }} />
      </div>

      {step === 0 && (
        <div>
          <Eyebrow>Anonymous survey · about {template.estMinutes} minutes</Eyebrow>
          <h1 className="font-serif text-3xl mt-2 leading-tight" style={{ color: BRAND.ink }}>{template.name}</h1>
          <div className="mt-1.5 text-base font-medium" style={{ color: BRAND.plum }}>{campaign.clinicianName}</div>
          {template.introText && <p className="mt-4 text-sm leading-relaxed" style={{ color: BRAND.grey }}>{template.introText}</p>}
          <Btn onClick={() => setStep(1)} className="mt-8 w-full !py-4 text-lg">Begin</Btn>
          <div className="mt-4 rounded-xl p-4 text-sm leading-relaxed" style={{ background: BRAND.plumSoft, color: BRAND.plumDeep }}>
            <span className="font-semibold">Your answers are anonymous.</span> No identifying information is
            collected, and results are only shown combined with other responses.
          </div>
          <div className="flex items-center justify-between gap-3 mt-6 pt-4 border-t" style={{ borderColor: BRAND.line }}>
            {template.collegeLogo ? <CollegeLogo src={template.collegeLogo} maxHeight={36} /> : <span />}
            <BrandMark />
          </div>
        </div>
      )}

      {p && (
        <div>
          <Eyebrow>{p.leadIn ? "About you" : `Question ${labels[p.id]} of ${topLevel.filter((q) => !q.leadIn).length}`}</Eyebrow>
          <h2 className="font-serif text-2xl mt-2 leading-snug" style={{ color: BRAND.ink }}>{p.text}</h2>
          {p.description && <p className="text-sm mt-2 leading-relaxed" style={{ color: BRAND.grey }}>{p.description}</p>}
          <div className="mt-6">{field(p)}</div>

          {visKids.map((c) => (
            <div key={c.id} className="mt-6 pl-4 border-l-2" style={{ borderColor: BRAND.plumSoft }}>
              <div className="text-sm font-medium" style={{ color: BRAND.ink }}>{c.text}</div>
              {c.description && <p className="text-xs mt-1 leading-relaxed" style={{ color: BRAND.grey }}>{c.description}</p>}
              <div className="mt-3">{field(c)}</div>
            </div>
          ))}

          <div className="mt-8 flex gap-3">
            <Btn kind="ghost" onClick={() => setStep(step - 1)}>Back</Btn>
            {!isLast ? (
              <Btn disabled={!canAdvance} onClick={() => setStep(step + 1)} className="flex-1">Next</Btn>
            ) : (
              <Btn kind="good" disabled={!canAdvance} onClick={() => { onSubmit({ answers }); setDone(true); }} className="flex-1">
                Submit anonymously
              </Btn>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

// CLINICIAN VIEW — campaign list, wizard, campaign detail
// ─────────────────────────────────────────────────────────────────────────────
function ClinicianView({ data, setData, templates }) {
  const [mode, setMode] = useState({ screen: "list" }); // list | wizard | detail:{id}
  const [tab, setTab] = useState("campaigns"); // campaigns | settings

  const updateCampaign = (id, patch) =>
    setData({ ...data, campaigns: data.campaigns.map((c) => (c.id === id ? { ...c, ...patch } : c)) });
  const updateTemplate = (id, patch) =>
    setData({ ...data, customTemplates: data.customTemplates.map((t) => (t.id === id ? { ...t, ...patch } : t)) });
  const requestForm = async ({ name, note, file }) => {
    const id = uid();
    await saveSourceFile(id, file);
    setData({ ...data, formRequests: [...(data.formRequests || []), { id, name, note, fileName: file.name, fileType: file.type, status: "requested", createdAt: new Date().toISOString(), fileRef: id }] });
  };

  if (mode.screen === "wizard") {
    return (
      <CampaignWizard
        templates={templates}
        colleges={data.colleges || DEFAULT_COLLEGES}
        onCancel={() => setMode({ screen: "list" })}
        onUpdateTemplate={updateTemplate}
        onRelease={(campaign) => {
          setData({ ...data, campaigns: [...data.campaigns, campaign] });
          setMode({ screen: "detail", id: campaign.id });
        }}
        onReleaseWithTemplate={(campaign, template) => {
          setData({ ...data, campaigns: [...data.campaigns, campaign], customTemplates: [...data.customTemplates, template] });
          setMode({ screen: "detail", id: campaign.id });
        }}
        onRequestForm={requestForm}
      />
    );
  }

  if (mode.screen === "detail") {
    const campaign = data.campaigns.find((c) => c.id === mode.id);
    const template = campaign && tplFor(campaign, templates);
    if (campaign && template) {
      return (
        <CampaignDetail campaign={campaign} template={template}
          libraryVersion={(templates.find((t) => t.id === campaign.templateId) || {}).version}
          onBack={() => setMode({ screen: "list" })}
          onUpdate={(patch) => updateCampaign(campaign.id, patch)} />
      );
    }
  }

  return (
    <div className="max-w-3xl mx-auto px-5 pb-20">
      <div className="flex gap-1 mt-6 p-1 rounded-xl" style={{ background: BRAND.plumSoft, maxWidth: 320 }}>
        {[["campaigns", "Campaigns"], ["settings", "Settings"]].map(([id, label]) => (
          <button key={id} onClick={() => setTab(id)} className="flex-1 py-2.5 rounded-lg text-sm font-semibold"
            style={{ background: tab === id ? "white" : "transparent", color: tab === id ? BRAND.plum : BRAND.grey }}>
            {label}
          </button>
        ))}
      </div>

      {tab === "campaigns" && (
        <>
          <div className="flex items-center justify-between mt-5">
            <h2 className="font-serif text-2xl" style={{ color: BRAND.ink }}>Your survey campaigns</h2>
            <Btn onClick={() => setMode({ screen: "wizard" })}>+ New campaign</Btn>
          </div>
          <div className="mt-5 space-y-3">
            {data.campaigns.length === 0 && (
              <Card>
                <p className="text-sm" style={{ color: BRAND.grey }}>
                  No campaigns yet. Create one from a verified template — or, if the form you need isn't
                  in the library, upload it from the New campaign screen to send to an administrator.
                </p>
              </Card>
            )}
            {[...data.campaigns].sort((a, b) => new Date(b.createdAt || 0) - new Date(a.createdAt || 0)).map((c) => {
              const t = tplFor(c, templates);
              const fac = c.distribution === "facilitated";
              const rel = !!c.releasedToClinician;
              const cq = quotaInfo(t, c.responses);
              const sub = fac
                ? (rel ? "Released by your facilitator" : `Awaiting release from ${c.facilitator?.name || "your facilitator"}`)
                : cq
                  ? `${cq.groups.filter((g) => g.met).length}/${cq.groups.length} groups met${cq.groupsMet ? " · summary unlocked" : ""}`
                  : `${c.responses.length}/${c.threshold} responses${c.responses.length >= c.threshold ? " · summary unlocked" : ""}`;
              return (
                <button key={c.id} onClick={() => setMode({ screen: "detail", id: c.id })} className="w-full text-left">
                  <Card className="hover:shadow-sm transition-shadow">
                    <div className="flex items-center justify-between gap-3">
                      <div>
                        <div className="font-semibold" style={{ color: BRAND.ink }}>{c.name}</div>
                        <div className="text-sm mt-0.5" style={{ color: BRAND.grey }}>
                          {t?.name} · {sub}
                        </div>
                        {c.createdAt && (
                          <div className="text-xs mt-0.5" style={{ color: BRAND.grey }}>
                            Created {new Date(c.createdAt).toLocaleDateString("en-NZ", { day: "numeric", month: "short", year: "numeric" })}
                          </div>
                        )}
                      </div>
                      <Badge status={c.status} />
                    </div>
                  </Card>
                </button>
              );
            })}
          </div>
        </>
      )}

      {tab === "settings" && (
        <div className="mt-5 space-y-4">
          <Card>
            <h3 className="font-serif text-lg" style={{ color: BRAND.ink }}>Account &amp; security</h3>
            <p className="text-sm mt-1" style={{ color: BRAND.grey }}>
              Password and sign-in settings will live here.
            </p>
            <div className="mt-3 text-sm rounded-xl p-3" style={{ background: BRAND.paper, color: BRAND.grey }}>
              Coming soon.
            </div>
          </Card>

          <Card>
            <h3 className="font-serif text-lg" style={{ color: BRAND.ink }}>Subscription &amp; billing</h3>
            <p className="text-sm mt-1" style={{ color: BRAND.grey }}>
              Your plan, invoices and payment details will live here.
            </p>
            <div className="mt-3 text-sm rounded-xl p-3" style={{ background: BRAND.paper, color: BRAND.grey }}>
              Coming soon.
            </div>
          </Card>

          <Card>
            <h3 className="font-serif text-lg" style={{ color: BRAND.ink }}>Forms you've sent for review</h3>
            <p className="text-sm mt-1" style={{ color: BRAND.grey }}>
              Forms you've uploaded for an administrator to verify and add to the shared library.
            </p>
            {(data.formRequests || []).length > 0 ? (
              <div className="mt-3 space-y-2">
                {(data.formRequests || []).map((r) => (
                  <div key={r.id} className="flex items-center justify-between gap-3 text-sm">
                    <span style={{ color: BRAND.ink }}>{r.name} <span style={{ color: BRAND.grey }}>· {r.fileName}</span></span>
                    <Badge status={r.status === "requested" ? "submitted" : r.status === "imported" ? "verified" : "rejected"} />
                  </div>
                ))}
              </div>
            ) : (
              <div className="mt-3 text-sm rounded-xl p-3" style={{ background: BRAND.paper, color: BRAND.grey }}>
                You haven't sent any forms for review. Upload one from the New campaign screen if the form
                you need isn't in the library.
              </div>
            )}
          </Card>
        </div>
      )}
    </div>
  );
}

// ── Campaign wizard: source → (parse) → review → configure → release ────────
function CampaignWizard({ templates, colleges = [], onCancel, onRelease, onReleaseWithTemplate, onUpdateTemplate, onRequestForm }) {
  const [stage, setStage] = useState("source"); // source | review | configure
  const [template, setTemplate] = useState(null);
  const [error, setError] = useState(null);
  const [cfg, setCfg] = useState({ name: "", clinicianName: "", threshold: 15, distribution: "facilitated", facName: "", facEmail: "", facRole: "", hideResults: false });
  const [reqName, setReqName] = useState("");
  const [reqNote, setReqNote] = useState("");
  const [reqFile, setReqFile] = useState(null); // { name, type, encoding, data }
  const [reqDone, setReqDone] = useState(false);
  const readRequestFile = (file) => {
    if (!file) return;
    const isPdf = file.type === "application/pdf";
    const reader = new FileReader();
    reader.onload = () => setReqFile({ name: file.name, type: file.type, encoding: isPdf ? "base64" : "text", data: isPdf ? String(reader.result).split(",")[1] : String(reader.result) });
    if (isPdf) reader.readAsDataURL(file); else reader.readAsText(file);
    if (!reqName) setReqName(file.name.replace(/\.[^.]+$/, ""));
  };
  const sendRequest = () => { if (!reqFile) return; onRequestForm && onRequestForm({ name: reqName || reqFile.name, note: reqNote, file: reqFile }); setReqDone(true); };
  const [query, setQuery] = useState("");
  const [collegeFilter, setCollegeFilter] = useState("all");

  const verified = templates.filter((t) => t.status === "verified");
  const mine = templates.filter((t) => ["private", "submitted", "rejected"].includes(t.status));
  const reviewLabels = useMemo(() => (template ? Object.fromEntries(withNumbers(template.questions).map((x) => [x.id, x.label])) : {}), [template]);
  const collegesInLibrary = Array.from(new Set(verified.map((t) => t.college).filter(Boolean)));
  const filteredVerified = verified.filter((t) => {
    const q = query.trim().toLowerCase();
    const matchText = !q || t.name.toLowerCase().includes(q) || (t.description || "").toLowerCase().includes(q);
    const matchCollege = collegeFilter === "all" || t.college === collegeFilter;
    return matchText && matchCollege;
  });

  const chooseTemplate = (t) => {
    setTemplate(t);
    setCfg({ name: t.name, clinicianName: "", threshold: t.defaultThreshold, distribution: "facilitated", facName: "", facEmail: "", facRole: "", hideResults: false });
    setStage("review");
  };

  const release = () => {
    const campaign = {
      id: uid(), templateId: template.id, name: cfg.name || template.name,
      clinicianName: cfg.clinicianName || "Unnamed clinician",
      threshold: Math.max(1, cfg.threshold), status: "released",
      distribution: cfg.distribution === "self" ? "self" : "facilitated",
      facilitator: cfg.distribution === "self" ? null : { name: cfg.facName.trim(), email: cfg.facEmail.trim(), role: cfg.facRole.trim() },
      hideFromFacilitator: cfg.distribution === "facilitated" && !!cfg.hideResults,
      releasedToClinician: null,
      createdAt: new Date().toISOString(), responses: [],
      templateVersion: template.version || 1,
      templateSnapshot: JSON.parse(JSON.stringify({ ...template, status: template.status })),
    };
    onRelease(campaign);
  };

  return (
    <div className="max-w-3xl mx-auto px-5 pb-20">
      <div className="flex items-center justify-between mt-6">
        <h2 className="font-serif text-2xl" style={{ color: BRAND.ink }}>New campaign</h2>
        <Btn kind="ghost" onClick={onCancel}>Cancel</Btn>
      </div>

      {/* stage indicator */}
      <div className="flex gap-2 mt-4 text-xs font-semibold" style={{ color: BRAND.grey }}>
        {["Choose survey", "Review questions", "Configure & release"].map((s, i) => {
          const idx = stage === "source" ? 0 : stage === "review" ? 1 : 2;
          return (
            <div key={s} className="flex-1 text-center py-1.5 rounded-lg"
              style={{ background: i === idx ? BRAND.plumSoft : "transparent", color: i === idx ? BRAND.plum : BRAND.grey }}>
              {i + 1}. {s}
            </div>
          );
        })}
      </div>

      {error && <div className="mt-4 rounded-xl p-3 text-sm" style={{ background: "#FBEAE5", color: BRAND.bad }}>{error}</div>}

      {stage === "source" && (
        <div className="mt-5 space-y-5">
          <Card>
            <h3 className="font-serif text-lg" style={{ color: BRAND.ink }}>From the verified library</h3>
            <p className="text-sm mt-1" style={{ color: BRAND.grey }}>Templates reviewed and approved by an administrator.</p>
            <div className="flex flex-col sm:flex-row gap-2 mt-3">
              <input value={query} onChange={(e) => setQuery(e.target.value)} placeholder="Search by name…"
                className="flex-1 rounded-xl border-2 p-2.5 text-sm outline-none" style={{ borderColor: BRAND.line, color: BRAND.ink }} />
              <select value={collegeFilter} onChange={(e) => setCollegeFilter(e.target.value)}
                className="rounded-xl border-2 p-2.5 text-sm outline-none bg-white" style={{ borderColor: BRAND.line, color: BRAND.ink }}>
                <option value="all">All colleges</option>
                {collegesInLibrary.map((c) => <option key={c} value={c}>{c}</option>)}
              </select>
            </div>
            <div className="mt-3 space-y-2">
              {filteredVerified.map((t) => (
                <button key={t.id} onClick={() => chooseTemplate(t)} className="w-full text-left rounded-xl border-2 p-3.5 hover:border-current"
                  style={{ borderColor: BRAND.line }}>
                  <div className="flex items-center justify-between gap-3">
                    <div>
                      <div className="font-semibold" style={{ color: BRAND.ink }}>{t.name}</div>
                      <div className="text-xs mt-0.5" style={{ color: BRAND.grey }}>{t.college} · {t.questions.length} questions · ~{t.estMinutes} min</div>
                    </div>
                    <Badge status="verified" />
                  </div>
                </button>
              ))}
              {filteredVerified.length === 0 && (
                <div className="text-sm rounded-xl p-3" style={{ background: BRAND.paper, color: BRAND.grey }}>No matching templates. Try clearing the search or college filter.</div>
              )}
            </div>
          </Card>

          {mine.length > 0 && (
            <Card>
              <h3 className="font-serif text-lg" style={{ color: BRAND.ink }}>Your own templates</h3>
              <p className="text-sm mt-1" style={{ color: BRAND.grey }}>Created or generated by you. Usable now; submit one for verification to propose it for the shared library.</p>
              <div className="mt-3 space-y-2">
                {mine.map((t) => (
                  <div key={t.id} className="rounded-xl border-2 p-3.5" style={{ borderColor: BRAND.line, background: BRAND.paper }}>
                    <div className="flex items-center justify-between gap-3">
                      <button onClick={() => chooseTemplate(t)} className="text-left flex-1">
                        <div className="font-semibold" style={{ color: BRAND.ink }}>{t.name}</div>
                        <div className="text-xs mt-0.5" style={{ color: BRAND.grey }}>{t.questions.length} questions</div>
                      </button>
                      <div className="flex items-center gap-2 shrink-0">
                        <Badge status={t.status} />
                        {onUpdateTemplate && t.status !== "submitted" && (
                          <Btn kind="soft" onClick={() => onUpdateTemplate(t.id, { status: "submitted" })}>Submit for verification</Btn>
                        )}
                        {onUpdateTemplate && t.status === "submitted" && (
                          <Btn kind="ghost" onClick={() => onUpdateTemplate(t.id, { status: "private" })}>Withdraw</Btn>
                        )}
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </Card>
          )}

          <Card>
            <h3 className="font-serif text-lg" style={{ color: BRAND.ink }}>Can't find your form?</h3>
            <p className="text-sm mt-1 leading-relaxed" style={{ color: BRAND.grey }}>
              Upload a PDF of the form and send it to an administrator. They'll check it, build a
              verified template, and add it to the library — you'll be able to use it once it's approved.
            </p>
            {reqDone ? (
              <div className="mt-3 rounded-xl p-3 text-sm" style={{ background: "#E5F2EC", color: BRAND.good }}>
                Request sent. An administrator will review your form.
              </div>
            ) : (
              <>
                <input value={reqName} onChange={(e) => setReqName(e.target.value)} placeholder="What is this form called?"
                  className="mt-3 w-full rounded-xl border-2 p-2.5 text-sm outline-none" style={{ borderColor: BRAND.line, color: BRAND.ink }} />

// ── respondent-group quota (per-group minimums on a designated single-select question) ──
function quotaInfo(template, responses) {
  const groupQ = template?.questions?.find((q) => q.quota && Object.keys(q.quota).length > 0);
  if (!groupQ) return null;
  const got = {};
  for (const r of responses) { const c = r.answers?.[groupQ.id]?.choice; if (c) got[c] = (got[c] || 0) + 1; }
  const groups = Object.entries(groupQ.quota).filter(([, min]) => min > 0).map(([opt, min]) => ({ opt, min, got: got[opt] || 0, met: (got[opt] || 0) >= min }));
  if (!groups.length) return null;
  const groupsMet = groups.every((g) => g.met);
  const requiredTotal = groups.reduce((s, g) => s + g.min, 0);
  return { groupQ, groups, groupsMet, requiredTotal };
}

function EmailInvitePanel({ campaign, onUpdate }) {
  const [input, setInput] = useState("");
  const [error, setError] = useState(null);
  const invitations = campaign.invitations || [];
  const isClosed = campaign.status === "closed";
  const isValidEmail = (e) => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e.trim());

  const send = () => {
    const email = input.trim();
    if (!isValidEmail(email)) { setError("Please enter a valid email address."); return; }
    onUpdate({ invitations: [...invitations, { email, sentAt: new Date().toISOString() }] });
    setInput(""); setError(null);
  };

  return (
    <Card>
      <h3 className="font-serif text-lg" style={{ color: BRAND.ink }}>Send survey link by email</h3>
      <p className="text-sm mt-1 leading-relaxed" style={{ color: BRAND.grey }}>
        Enter an email address to invite a respondent. In production this sends a real email with the survey link; here it just records the invitation.
      </p>
      {isClosed && (
        <div className="mt-2 rounded-xl p-2.5 text-xs leading-relaxed" style={{ background: BRAND.amberSoft, color: "#8a5a13" }}>
          This survey is currently closed — re-open it from Settings before sending new invitations.
        </div>
      )}
      <div className="mt-3 flex gap-2">
        <input type="email" value={input} placeholder="name@example.com" disabled={isClosed}
          onChange={(e) => { setInput(e.target.value); setError(null); }}
          onKeyDown={(e) => { if (e.key === "Enter" && !isClosed) send(); }}
          className="flex-1 rounded-xl border-2 p-2.5 text-sm outline-none"
          style={{ borderColor: error ? BRAND.bad : BRAND.line, color: BRAND.ink, background: isClosed ? BRAND.paper : "white" }} />
        <Btn disabled={isClosed || !input.trim()} onClick={send}>Send link</Btn>
      </div>
      {error && <div className="mt-1.5 text-xs" style={{ color: BRAND.bad }}>{error}</div>}
      {invitations.length > 0 && (
        <div className="mt-4 border-t pt-3" style={{ borderColor: BRAND.line }}>
          <div className="text-xs font-semibold mb-2" style={{ color: BRAND.grey }}>Sent ({invitations.length})</div>
          <div className="space-y-1.5">
            {[...invitations].reverse().map((inv, i) => (
              <div key={i} className="flex items-center justify-between gap-3 text-xs">
                <span style={{ color: BRAND.ink }}>{inv.email}</span>
                <span className="shrink-0" style={{ color: BRAND.grey }}>
                  {new Date(inv.sentAt).toLocaleString("en-NZ", { day: "numeric", month: "short", year: "numeric", hour: "2-digit", minute: "2-digit" })}
                </span>
              </div>
            ))}
          </div>
        </div>
      )}
    </Card>
  );
}

  const qInfo = quotaInfo(template, campaign.responses);
  const requiredTotal = qInfo ? qInfo.requiredTotal : campaign.threshold;
  const thresholdMet = qInfo ? qInfo.groupsMet : n >= campaign.threshold;
  const unlocked = isFacilitator ? thresholdMet : (facilitated ? released : thresholdMet);
  const clinicianWaiting = !isFacilitator && facilitated && !released;
  const clinicianPrivate = !isFacilitator && facilitated && !!campaign.hideFromFacilitator;
  const labels = useMemo(() => Object.fromEntries(withNumbers(template.questions).map((x) => [x.id, x.label])), [template.questions]);

    if (extra.length) onUpdate({ responses: [...campaign.responses, ...extra] });

  const clearResponses = () => { onUpdate({ responses: [] }); setClearArmed(false); };
  const lockedEl = clinicianWaiting

    : <Locked n={n} threshold={requiredTotal} groups={qInfo ? qInfo.groups : null} />;

function DistBars({ min, max, dist, mean, bands, labels }) {
  const values = []; for (let v = min; v <= max; v++) values.push(v);
  const peak = Math.max(...values.map((v) => dist[v] || 0), 1);
  return (
    <div className="mt-3">
      <div className="flex items-end gap-1 h-16">
        {values.map((v) => (
          <div key={v} className="flex-1 flex flex-col justify-end h-full">

          </div>
        ))}
      </div>
      <div className="flex gap-1 text-center text-xs mt-1" style={{ color: BRAND.grey }}>
        {values.map((v) => <div key={v} className="flex-1">{v}<div className="font-semibold" style={{ color: BRAND.ink }}>{dist[v] || ""}</div></div>)}
      </div>
      {bands && (
        <div className="flex gap-1 mt-1">
          {bands.map((b) => (
            <div key={b.label} className="text-center text-[10px] leading-tight px-1 py-0.5 rounded" style={{ flex: b.to - b.from + 1, background: BRAND.paper, color: BRAND.grey }}>
              {b.label}
            </div>

        </div>

      {labels && !bands && values.some((v) => labels[v] && String(labels[v]).trim()) && (
        <div className="text-[10px] mt-1 leading-snug" style={{ color: BRAND.grey }}>
          {values.filter((v) => labels[v] && String(labels[v]).trim()).map((v) => `${v} = ${labels[v]}`).join("  ·  ")}

    </div>
  );
}

// Builds the paired self/aggregate dataset for the overlay. Only rating items
// where the clinician supplied a self score AND the aggregate has ≥1 rating are
// "paired" (usable for gap analysis); the rest are returned for context.
function buildSelfComparison(template, stats, selfAssessment) {
  const selfAns = (selfAssessment && selfAssessment.answers) || {};
  const items = selfRatingQuestions(template).map((q) => {
    const sa = selfAns[q.id] || {};
    const selfVal = typeof sa.rating === "number" ? sa.rating : null;
    const agg = stats.byQ[q.id];
    const aggMean = agg && agg.ratingN > 0 ? agg.mean : null;
    return {
      id: q.id, label: q.label, text: q.text,
      min: q.scale.min, max: q.scale.max,
      selfVal, aggMean, aggN: agg ? agg.ratingN : 0,
      paired: selfVal != null && aggMean != null,
    };
  });
  const paired = items.filter((it) => it.paired);
  // Uniform scale ⇒ we can label axes/rings with real values; otherwise normalise.
  const scaleKeys = Array.from(new Set(paired.map((it) => `${it.min}-${it.max}`)));
  const uniform = scaleKeys.length === 1 && paired.length > 0;
  const scale = uniform ? { min: paired[0].min, max: paired[0].max } : null;
  return { items, paired, uniform, scale };
}

// Radar / spider overlay. Uses only paired items (need ≥3 axes to be meaningful).
function SelfRadar({ data }) {
  const items = data.paired;
  const N = items.length;
  const size = 320, cx = size / 2, cy = size / 2, R = 116;
  const frac = (v, it) => {
    if (v == null || it.max <= it.min) return 0;
    const f = (v - it.min) / (it.max - it.min);
    return Math.max(0, Math.min(1, f));
  };
  const angle = (i) => (-90 + (360 / N) * i) * (Math.PI / 180);
  const pt = (i, r) => [cx + R * r * Math.cos(angle(i)), cy + R * r * Math.sin(angle(i))];
  const poly = (key) => items.map((it, i) => pt(i, frac(it[key], it)).join(",")).join(" ");
  const rings = [0.25, 0.5, 0.75, 1];
  const ringLabel = (f) => data.uniform ? Math.round(data.scale.min + f * (data.scale.max - data.scale.min)) : `${Math.round(f * 100)}%`;

  return (
    <div className="flex flex-col items-center">
      <svg viewBox={`0 0 ${size} ${size}`} width={size} height={size} style={{ maxWidth: "100%" }}>
        {/* grid rings */}
        {rings.map((f) => (
          <polygon key={f}
            points={items.map((_, i) => pt(i, f).join(",")).join(" ")}
            fill="none" stroke={BRAND.line} strokeWidth="1" />
        ))}
        {/* spokes + axis labels */}
        {items.map((it, i) => {
          const [ex, ey] = pt(i, 1);
          const [lx, ly] = pt(i, 1.13);
          return (
            <g key={it.id}>
              <line x1={cx} y1={cy} x2={ex} y2={ey} stroke={BRAND.line} strokeWidth="1" />
              <text x={lx} y={ly} fontSize="10" fontWeight="600" fill={BRAND.grey}
                textAnchor={Math.abs(lx - cx) < 6 ? "middle" : lx > cx ? "start" : "end"}
                dominantBaseline="middle">{it.label}</text>
            </g>
          );
        })}
        {/* ring value labels along the top spoke */}
        {rings.map((f) => {
          const [, ry] = pt(0, f);
          return <text key={"r" + f} x={cx + 3} y={ry - 2} fontSize="8" fill={BRAND.grey}>{ringLabel(f)}</text>;
        })}
        {/* aggregate polygon */}
        <polygon points={poly("aggMean")} fill={AGG_COLOR} fillOpacity="0.22" stroke={AGG_COLOR} strokeWidth="2"
          style={{ printColorAdjust: "exact", WebkitPrintColorAdjust: "exact" }} />
        {/* self polygon */}
        <polygon points={poly("selfVal")} fill={SELF_COLOR} fillOpacity="0.22" stroke={SELF_COLOR} strokeWidth="2"
          style={{ printColorAdjust: "exact", WebkitPrintColorAdjust: "exact" }} />
        {/* vertices */}
        {items.map((it, i) => {
          const [ax, ay] = pt(i, frac(it.aggMean, it));
          const [sx, sy] = pt(i, frac(it.selfVal, it));
          return (
            <g key={"v" + it.id}>
              <circle cx={ax} cy={ay} r="2.5" fill={AGG_COLOR} />
              <circle cx={sx} cy={sy} r="2.5" fill={SELF_COLOR} />
            </g>
          );
        })}
      </svg>
      {/* number → name key */}
      <div className="mt-3 grid grid-cols-1 sm:grid-cols-2 gap-x-6 gap-y-0.5 w-full">
        {items.map((it) => (
          <div key={it.id} className="text-[11px] flex gap-1.5" style={{ color: BRAND.ink }}>
            <span className="font-semibold shrink-0" style={{ color: BRAND.amber }}>{it.label}.</span>
            <span className="truncate">{it.text}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function SelfComparison({ template, stats, campaign }) {
  const data = useMemo(() => buildSelfComparison(template, stats, campaign.selfAssessment), [template, stats, campaign.selfAssessment]);
  const radarOk = data.paired.length >= 3;
  const [mode, setMode] = useState("bars");
  const view = mode === "radar" && radarOk ? "radar" : "bars";
  const completedAt = campaign.selfAssessment && campaign.selfAssessment.completedAt;

  if (!data.items.length) return null;

  return (
    <Card className="mb-5 break-inside-avoid print:!border print:!rounded-lg">
      <div className="flex flex-wrap items-start justify-between gap-3">
        <div>
          <Eyebrow>Self-assessment vs aggregate</Eyebrow>
          <h3 className="font-serif text-xl mt-1" style={{ color: BRAND.ink }}>How your self-ratings compare</h3>
          <p className="text-xs mt-1 leading-relaxed" style={{ color: BRAND.grey }}>
            Your own ratings overlaid against the aggregate of others' responses. Gaps highlight areas where
            self-perception and external feedback diverge.
            {completedAt && <> Self-assessment completed {new Date(completedAt).toLocaleDateString("en-NZ", { day: "numeric", month: "long", year: "numeric" })}.</>}
          </p>
        </div>
        {radarOk && (
          <div className="flex rounded-lg p-0.5 print:hidden" style={{ background: BRAND.paper, border: `1px solid ${BRAND.line}` }}>
            {[["bars", "Bars"], ["radar", "Radar"]].map(([id, lab]) => (
              <button key={id} onClick={() => setMode(id)} className="px-3 py-1 rounded-md text-xs font-semibold"
                style={{ background: view === id ? "white" : "transparent", color: view === id ? BRAND.plumDeep : BRAND.grey, boxShadow: view === id ? "0 1px 2px rgba(0,0,0,0.08)" : "none" }}>
                {lab}
              </button>
            ))}

        <div className="mt-3 text-sm rounded-xl p-3" style={{ background: BRAND.amberSoft, color: "#8a5a13" }}>

      <div className="mt-4">
        {view === "radar" ? <SelfRadar data={data} /> : <SelfBars data={data} />}

      {view === "bars" && data.paired.length > 0 && data.paired.length < 3 && (
        <p className="text-[11px] mt-3 print:hidden" style={{ color: BRAND.grey }}>

        </p>

  );

// ── Report tab: renders the template's designated layout (admin-owned) ───────
function ReportTab({ campaign, template, stats, n, onUpdate, viewer = "clinician" }) {
  const layout = template.reportLayout;
  const showSelf = viewer !== "facilitator" && !!template.enableSelfAssessment && !!(campaign.selfAssessment && campaign.selfAssessment.answers);
  const [email, setEmail] = useState("");
  const [emailError, setEmailError] = useState(null);
  const [lastSent, setLastSent] = useState(null);
  const isValidEmail = (e) => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e.trim());

  const sendReport = () => {
    const addr = email.trim();
    if (!isValidEmail(addr)) { setEmailError("Please enter a valid email address."); return; }
    const entry = { email: addr, sentAt: new Date().toISOString() };
    if (onUpdate) onUpdate({ reportShares: [...(campaign.reportShares || []), entry] });
    setLastSent(entry);
    setEmail(""); setEmailError(null);
  };

  return (
    <div className="mt-5">
      <div className="flex flex-wrap items-start justify-between gap-3 mb-4 print:hidden">
        <div>
          <div className="flex items-center gap-2">
            <input type="email" value={email} placeholder="Share report by email…" onChange={(e) => { setEmail(e.target.value); setEmailError(null); setLastSent(null); }}
              onKeyDown={(e) => { if (e.key === "Enter") sendReport(); }}
              className="rounded-xl border-2 px-3 py-2 text-sm outline-none w-64"
              style={{ borderColor: emailError ? BRAND.bad : BRAND.line, color: BRAND.ink }} />
            <Btn kind="soft" disabled={!email.trim()} onClick={sendReport}>Send</Btn>
          </div>
          {emailError && <div className="mt-1 text-xs" style={{ color: BRAND.bad }}>{emailError}</div>}
          {lastSent && (
            <div className="mt-1 text-xs" style={{ color: BRAND.good }}>
              ✓ Report sent to {lastSent.email}
            </div>
          )}
          {!emailError && !lastSent && (
            <div className="mt-1 text-xs" style={{ color: BRAND.grey }}>In production this emails the report PDF to the recipient.</div>
          )}
        </div>
        <Btn kind="soft" onClick={() => window.print()}>Print / save as PDF</Btn>
      </div>
      {showSelf && <SelfComparison template={template} stats={stats} campaign={campaign} />}
      {layout === "custom" && Array.isArray(template.reportSections)
        ? <SectionedReport campaign={campaign} n={n} stats={stats} template={template} />
        : <AutoReport campaign={campaign} n={n} stats={stats} template={template} />}
    </div>
  );
}

// ── Shared per-question result block (used by the data-driven SectionedReport) ──
// Renders the heading + the right statistic for one question. `commentsMode`:
//   "full"  → list every comment (PES style)
//   "count" → show the count, then the comments (Auto style)
//   "none"  → suppress comments entirely (used when a comments section handles them)
function QuestionStatBlock({ q, s, label, commentsMode = "full" }) {
  if (!s) return null;
  return (
    <div className={`border rounded-lg overflow-hidden break-inside-avoid ${q.parentId ? "ml-5" : ""}`} style={{ borderColor: BRAND.line }}>
      <div className="px-2.5 py-1.5 text-sm font-semibold" style={{ background: BRAND.paper, color: BRAND.ink }}>
        {label ? label + ". " : ""}{q.text}
      </div>
      <div className="px-2.5 py-2.5 text-sm" style={{ color: BRAND.ink }}>
        {q.type === "yn" && <PercentBar yes={s.yes} no={s.no} />}
        {q.type === "rating" && (
          <>
            <DistBars min={q.scale.min} max={q.scale.max} dist={s.dist} mean={s.mean} bands={q.scale.bands} labels={q.scale.labels} />
            {s.na > 0 && <div className="text-xs mt-1" style={{ color: BRAND.grey }}>{q.scale.na}: {s.na}</div>}
          </>
        )}
        {q.type === "text" && commentsMode !== "none" && (
          commentsMode === "count"
            ? <>
                <span style={{ color: BRAND.grey }}>{s.comments.length} response{s.comments.length === 1 ? "" : "s"}</span>
                {s.comments.length > 0 && (
                  <div className="text-xs mt-1.5 leading-relaxed" style={{ color: BRAND.ink }}>
                    {s.comments.map((c, i) => <span key={i}>"{c}"{i < s.comments.length - 1 ? " · " : ""}</span>)}
                  </div>
                )}
              </>
            : (s.comments.length > 0
                ? <div className="text-xs leading-relaxed" style={{ color: BRAND.ink }}><span className="font-semibold">Comments: </span>{s.comments.map((c, i) => <span key={i}>"{c}"{i < s.comments.length - 1 ? " · " : ""}</span>)}</div>
                : <div className="text-xs" style={{ color: BRAND.grey }}>No comments.</div>)
        )}
        {(q.type === "choice" || q.type === "checkboxes") && (
          <div className="space-y-1">
            {(q.options || []).map((o) => {
              const c = s.opts[o] || 0;
              const pct = s.pickedN ? Math.round((c / s.pickedN) * 100) : 0;
              return (
                <div key={o} className="flex items-center gap-2 text-xs">
                  <div className="w-40 shrink-0" style={{ color: BRAND.ink }}>{o}</div>
                  <div className="flex-1 h-2 rounded-full overflow-hidden" style={{ background: BRAND.line }}>
                    <div className="h-full rounded-full" style={{ width: pct + "%", background: BRAND.amber, printColorAdjust: "exact", WebkitPrintColorAdjust: "exact" }} />
                  </div>
                  <div className="w-16 text-right" style={{ color: BRAND.grey }}>{c} ({pct}%)</div>
                </div>
              );
            })}
            {q.type === "checkboxes" && <div className="text-xs" style={{ color: BRAND.grey }}>multiple selections allowed</div>}
          </div>
        )}
      </div>
    </div>
  );
}

// ── Data-driven report: walks an array of section objects (reportSections) ──────
// Section types:
//   { type:"heading",     text }
//   { type:"narrative",   text }
//   { type:"demographic", questionId, display:"inline"|"table" }
//   { type:"questions",   scope:"all"|"ids", ids?:[], commentsMode?, includeText? }
//   { type:"comments",    scope:"all"|"ids", ids?:[] }
// includeText:true on a questions section renders text/comment questions inline
// alongside the other questions (use for instruments like PES where comments
// are interleaved; omit for instruments like MSF where they're separated out).
function SectionedReport({ campaign, template, n, stats }) {
  const numbered = withNumbers(template.questions);
  const labels = Object.fromEntries(numbered.map((x) => [x.id, x.label]));
  const byId = Object.fromEntries(template.questions.map((q) => [q.id, q]));
  const sections = Array.isArray(template.reportSections) ? template.reportSections : [];
  const title = template.reportTitle || template.name;

  const resolveIds = (sec, pred) => {
    if (sec.scope === "ids" && Array.isArray(sec.ids)) return sec.ids.filter((id) => byId[id] && pred(byId[id]));
    return template.questions.filter((q) => !q.leadIn && pred(q)).map((q) => q.id);
  };

  return (
    <Card className="print:!p-0 print:!border-0 print:!rounded-none">
      <ReportHeader title={title} campaign={campaign} n={n} template={template} />
      <div className="mt-5 space-y-5">
        {sections.map((sec, i) => {
          if (sec.type === "heading") {
            return <div key={i} className="text-sm font-semibold pt-1" style={{ color: BRAND.ink }}>{sec.text}</div>;
          }
          if (sec.type === "narrative") {
            return <p key={i} className="text-xs leading-relaxed border-t pt-3 mt-2" style={{ color: BRAND.grey, borderColor: BRAND.line }}>{sec.text}</p>;
          }
          if (sec.type === "demographic") {
            const q = byId[sec.questionId];
            const s = q && stats.byQ[q.id];
            if (!q || !s) return null;
            const opts = q.options || [];
            const counts = opts.map((o) => s.opts[o] || 0);
            const maxCount = Math.max(...counts, 1);
            const total = counts.reduce((a, b) => a + b, 0);
            return (
              <div key={i}>
                <div className="text-sm font-semibold mb-2" style={{ color: BRAND.ink }}>{sec.heading || q.text}</div>
                <div className="space-y-1.5">
                  {opts.map((o, oi) => {
                    const n = counts[oi];
                    const pct = Math.round((n / maxCount) * 100);
                    const isEmpty = n === 0;
                    return (
                      <div key={o} className="flex items-center gap-2">
                        <div className="text-xs w-32 shrink-0 text-right" style={{ color: isEmpty ? BRAND.grey : BRAND.ink }}>{o}</div>
                        <div className="flex-1 h-5 rounded" style={{ background: BRAND.paper, border: `1px solid ${BRAND.line}` }}>
                          {!isEmpty && (
                            <div className="h-full rounded" style={{ width: pct + "%", background: AGG_COLOR, opacity: 0.75, minWidth: "1.5rem", printColorAdjust: "exact", WebkitPrintColorAdjust: "exact" }} />
                          )}
                        </div>
                        <div className="text-xs w-6 text-right font-semibold" style={{ color: isEmpty ? BRAND.grey : BRAND.ink }}>{n}</div>
                        {total > 0 && <div className="text-xs w-8" style={{ color: BRAND.grey }}>{Math.round((n / total) * 100)}%</div>}
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          }
          if (sec.type === "questions") {
            // includeText:true → render text questions inline (PES style, interleaved with other qs)
            // scope:"ids"      → always include named questions regardless of type
            // default          → exclude text questions (they belong in a separate comments section)
            const ids = resolveIds(sec, (q) => q.type !== "text" || !!sec.includeText || sec.scope === "ids");
            return (
              <div key={i} className="space-y-2">
                {ids.map((id) => <QuestionStatBlock key={id} q={byId[id]} s={stats.byQ[id]} label={labels[id]} commentsMode={sec.commentsMode || "full"} />)}
              </div>
            );
          }
          if (sec.type === "comments") {
            const ids = resolveIds(sec, (q) => q.type === "text");
            return (
              <div key={i} className="space-y-2">
                {ids.map((id) => <QuestionStatBlock key={id} q={byId[id]} s={stats.byQ[id]} label={labels[id]} commentsMode="full" />)}
              </div>
            );
          }
          return null;
        })}
      </div>
    </Card>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// Source-form viewer: opens a retained original (PDF or text) in a modal with an
// inline preview attempt plus an always-works Download. PDF preview can be blocked
// in some sandboxes, so Download is the guaranteed path to the original.
// ─────────────────────────────────────────────────────────────────────────────
function downloadSourceFile(file) {
  try {
    if (file.encoding === "base64") {
      const a = document.createElement("a");
      a.href = `data:${file.type || "application/pdf"};base64,${file.data}`;
      a.download = file.name || "source-form.pdf";
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
    } else {
      downloadText(file.name || "source-form.txt", String(file.data), (file.type || "text/plain") + ";charset=utf-8;");
    }
  } catch (e) { console.error(e); }
}

function SourceViewerModal({ refId, fileName, onClose }) {
  const [file, setFile] = useState(undefined); // undefined = loading, null = missing
  useEffect(() => {
    let alive = true;
    loadSourceFile(refId).then((f) => { if (alive) setFile(f); });
    return () => { alive = false; };
  }, [refId]);
  const isPdf = file && file.encoding === "base64";
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4" style={{ background: "rgba(11,34,56,0.55)" }} onClick={onClose}>
      <div className="bg-white rounded-2xl w-full max-w-3xl flex flex-col overflow-hidden" style={{ border: `1px solid ${BRAND.line}`, maxHeight: "88vh" }} onClick={(e) => e.stopPropagation()}>
        <div className="flex items-center justify-between gap-3 p-4 border-b" style={{ borderColor: BRAND.line }}>
          <div className="min-w-0">
            <div className="font-serif text-base truncate" style={{ color: BRAND.ink }}>Source form</div>
            <div className="text-xs truncate" style={{ color: BRAND.grey }}>{fileName || (file && file.name) || ""}</div>
          </div>
          <div className="flex items-center gap-2 shrink-0">
            {file && <Btn kind="ghost" onClick={() => downloadSourceFile(file)}>Download</Btn>}
            <Btn kind="ghost" onClick={onClose}>Close</Btn>
          </div>
        </div>
        <div className="flex-1 overflow-auto" style={{ background: BRAND.paper, minHeight: 120 }}>
          {file === undefined && <div className="p-6 text-sm" style={{ color: BRAND.grey }}>Loading…</div>}
          {file === null && <div className="p-6 text-sm" style={{ color: BRAND.bad }}>This source file is no longer stored on this device.</div>}
          {isPdf && (
            <div className="p-8 text-center">
              <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke={BRAND.grey} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" style={{ margin: "0 auto" }}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>
              <p className="text-sm mt-3 mb-4" style={{ color: BRAND.grey }}>{fileName || file.name || "PDF form"} — open the original to view it.</p>
              <Btn onClick={() => downloadSourceFile(file)}>Download PDF</Btn>
            </div>
          )}
          {file && file.encoding !== "base64" && (
            <pre className="p-4 text-xs whitespace-pre-wrap" style={{ color: BRAND.ink, fontFamily: "ui-monospace, monospace" }}>{String(file.data)}</pre>
          )}
        </div>
      </div>
    </div>
  );
}

// Drop-in link that opens the source viewer. Renders nothing when there is no ref.
function ViewSourceLink({ refId, fileName, label = "View source form", className = "" }) {
  const [open, setOpen] = useState(false);
  if (!refId) return null;
  return (
    <>
      <button onClick={(e) => { if (e && e.stopPropagation) e.stopPropagation(); setOpen(true); }}
        className={"inline-flex items-center gap-1 text-xs font-semibold " + className} style={{ color: BRAND.plum }}>
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>
        {label}
      </button>
      {open && <SourceViewerModal refId={refId} fileName={fileName} onClose={() => setOpen(false)} />}
    </>
  );
}

// Direct-download link: fetches the retained original and downloads it on click.
function DownloadSourceLink({ refId, fileName, label = "Download source", className = "" }) {
  const [busy, setBusy] = useState(false);
  if (!refId) return null;
  const go = async (e) => {
    if (e && e.stopPropagation) e.stopPropagation();
    setBusy(true);
    const file = await loadSourceFile(refId);
    setBusy(false);
    if (file) downloadSourceFile(file);
  };
  return (
    <button onClick={go} disabled={busy}
      className={"inline-flex items-center gap-1 text-xs font-semibold " + className} style={{ color: BRAND.plum, opacity: busy ? 0.6 : 1 }}>
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3v12M7 10l5 5 5-5M5 21h14"/></svg>
      {busy ? "Loading…" : label}
    </button>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// Shared: specimen uploader (PDF or pasted text → Claude → transform). Defaults
// to question import (PARSE_PROMPT + expandParsed); pass prompt/transform to
// reuse the same plumbing for report-structure import.
// ─────────────────────────────────────────────────────────────────────────────
function SpecimenUploader({ onParsed, onSource, busy, setBusy, prompt = PARSE_PROMPT, transform = expandParsed, noun = "questions", pasteHint = "Paste the form's questions here…", genLabel = "Generate questions" }) {
  const [pasted, setPasted] = useState("");
  const [error, setError] = useState(null);
  const [sourceNote, setSourceNote] = useState(null); // kept independent of parse errors

  const run = async (content) => {
    setBusy(true); setError(null);
    try {
      onParsed(transform(extractJSON(await callClaude(content))));
    } catch (e) {
      setError(`Couldn't read that form (${e.message}). Long or image-heavy PDFs can exceed the demo's response limit — try pasting the key ${noun} as text instead.`);
    }
    setBusy(false);
  };
  // Keep the uploaded original on file and report its reference back to the editor.
  const persistSource = async (fileObj) => {
    if (!onSource) return;
    setSourceNote(null);
    const id = "src-" + uid();
    const ok = await saveSourceFile(id, fileObj);
    if (ok) onSource({ refId: id, fileName: fileObj.name });
    else setSourceNote("The form was read, but the original was too large to keep on file (5 MB limit), so no source link was saved.");
  };
  const onFile = (file) => {
    if (!file) return;
    const reader = new FileReader();
    if (file.type === "application/pdf") {
      reader.onload = () => {
        const b64 = String(reader.result).split(",")[1];
        persistSource({ name: file.name, type: file.type, encoding: "base64", data: b64 });
        run([
          { type: "document", source: { type: "base64", media_type: "application/pdf", data: b64 } },
          { type: "text", text: prompt },
        ]);
      };
      reader.onerror = () => setError("Couldn't read that file.");
      reader.readAsDataURL(file);
    } else {
      reader.onload = () => {
        const text = String(reader.result);
        persistSource({ name: file.name, type: file.type || "text/plain", encoding: "text", data: text });
        run(prompt + "\n\n" + text.slice(0, 20000));
      };
      reader.onerror = () => setError("Couldn't read that file.");
      reader.readAsText(file);
    }
  };
  return (
    <div>
      <label className="block rounded-xl border-2 border-dashed p-6 text-center cursor-pointer" style={{ borderColor: BRAND.line }}>
        <input type="file" accept=".pdf,.txt,.md" className="hidden" disabled={busy} onChange={(e) => onFile(e.target.files?.[0])} />
        <span className="text-sm font-semibold" style={{ color: BRAND.plum }}>{busy ? "Reading…" : "Choose a PDF or text file…"}</span>
      </label>
      <div className="text-xs text-center my-2" style={{ color: BRAND.grey }}>or</div>
      <textarea rows={4} value={pasted} onChange={(e) => setPasted(e.target.value)} placeholder={pasteHint}
        className="w-full rounded-xl border-2 p-3 text-sm outline-none" style={{ borderColor: BRAND.line, color: BRAND.ink }} />
      <Btn disabled={busy || pasted.trim().length < 20} onClick={() => run(prompt + "\n\n" + pasted.slice(0, 20000))} className="mt-2">
        {busy ? "Generating…" : genLabel}
      </Btn>
      {error && <div className="mt-3 rounded-xl p-3 text-sm" style={{ background: "#FBEAE5", color: BRAND.bad }}>{error}</div>}
      {sourceNote && <div className="mt-3 rounded-xl p-3 text-sm" style={{ background: BRAND.amberSoft, color: "#8a5a13" }}>{sourceNote}</div>}
    </div>
  );
}
