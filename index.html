      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 28px; z-index: 9999;
      transition: opacity 0.3s ease;
    }
    #loading.fade-out { opacity: 0; pointer-events: none; }

    .loader-wordmark {

      letter-spacing: -0.03em; color: #0B2238;
    }
    .loader-wordmark span { color: #5A90BA; }
    .loader-sub {
      font-size: 0.78rem; font-weight: 500;
      letter-spacing: 0.12em; text-transform: uppercase; color: #5C6B79;
      margin-top: 4px;
    }
    .loader-spinner {
      width: 40px; height: 40px;
      border: 3px solid #DCE6EC; border-top-color: #5A90BA;
      border-radius: 50%; animation: spin 0.85s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader-label { font-size: 0.82rem; color: #5C6B79; }
    .loader-badge {
      position: absolute; bottom: 28px;
      font-size: 0.72rem; color: #5C6B79;
      background: #E9F0F6; padding: 4px 12px; border-radius: 999px;
    }
  </style>
